}

function drawTitle(){
  // ── 背景グラデーション ──
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#010918');
  bg.addColorStop(0.55,'#030d28');
  bg.addColorStop(1,'#000a1e');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // ── 雨粒 ──
  for(const d of titleRain){
    ctx.save();
    ctx.globalAlpha=d.a;
    ctx.strokeStyle=`rgba(120,200,255,1)`;
    ctx.lineWidth=d.s*0.6;
    const dx=d.sl*d.l,dy=d.l;
    ctx.beginPath();ctx.moveTo(d.x-dx,d.y-dy);ctx.lineTo(d.x,d.y);ctx.stroke();
    ctx.restore();
  }

  // ── 家のシルエット ──
  const houseW=W*0.68,houseH=H*0.20;
  const houseX=(W-houseW)/2,houseY=H*0.36;
  const roofH=houseH*0.50;
  ctx.save();
  ctx.fillStyle='rgba(2,10,30,0.92)';
  ctx.beginPath();
  // 屋根
  ctx.moveTo(houseX-houseW*0.04,houseY+roofH);
  ctx.lineTo(W/2,houseY);
  ctx.lineTo(houseX+houseW+houseW*0.04,houseY+roofH);
  ctx.lineTo(houseX+houseW,houseY+roofH);
  ctx.lineTo(houseX+houseW,houseY+houseH);
  ctx.lineTo(houseX,houseY+houseH);
  ctx.lineTo(houseX,houseY+roofH);
  ctx.closePath();ctx.fill();
  // 屋根の縁
  ctx.strokeStyle='rgba(60,130,220,0.55)';ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(houseX-houseW*0.04,houseY+roofH);
  ctx.lineTo(W/2,houseY);
  ctx.lineTo(houseX+houseW+houseW*0.04,houseY+roofH);
  ctx.stroke();
  // 窓（光）
  const winW=houseW*0.18,winH=houseH*0.28;
  const win1X=houseX+houseW*0.18,win2X=houseX+houseW*0.64;
  const winY=houseY+roofH+houseH*0.22;
  [win1X,win2X].forEach(wx=>{
    const wg=ctx.createRadialGradient(wx+winW/2,winY+winH/2,2,wx+winW/2,winY+winH/2,winW*0.9);
    wg.addColorStop(0,'rgba(255,240,140,0.80)');
    wg.addColorStop(1,'rgba(200,170,20,0.04)');
    ctx.fillStyle=wg;ctx.fillRect(wx,winY,winW,winH);
    ctx.strokeStyle='rgba(200,160,30,0.45)';ctx.lineWidth=1.5;
    ctx.strokeRect(wx,winY,winW,winH);
  });
  // 室内水たまり（床水）
  const pudY=houseY+houseH-houseH*0.09;
  const pudG=ctx.createLinearGradient(houseX,pudY,houseX,pudY+houseH*0.09);
  pudG.addColorStop(0,'rgba(20,100,200,0.60)');
  pudG.addColorStop(1,'rgba(5,30,100,0.80)');
  ctx.fillStyle=pudG;
  ctx.fillRect(houseX,pudY,houseW,houseH*0.09);
  // 雨漏り（屋根から落ちる水滴）
  const dripProg=(titleT*0.9)%1;
  const dripX=W/2+Math.sin(titleT*0.8)*houseW*0.10;
  const dripY0=houseY+roofH+2;
  const dripY1=dripY0+(pudY-dripY0)*dripProg;
  ctx.strokeStyle=`rgba(80,180,255,${0.7*(1-dripProg*0.4)})`;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(dripX,dripY0);ctx.lineTo(dripX,dripY1);ctx.stroke();
  const dripProg2=(titleT*0.9+0.55)%1;
  const dripX2=houseX+houseW*0.35+Math.sin(titleT*1.1)*houseW*0.07;
  const dripY12=dripY0+(pudY-dripY0)*dripProg2;
  ctx.strokeStyle=`rgba(80,180,255,${0.6*(1-dripProg2*0.4)})`;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(dripX2,dripY0);ctx.lineTo(dripX2,dripY12);ctx.stroke();
  ctx.restore();

  // ── タイトルロゴ ──
  ctx.textAlign='center';
  const logoY=H*0.10;
  const t1sz=Math.floor(W*0.185);
  ctx.save();
  ctx.shadowColor='rgba(30,160,255,1.0)';ctx.shadowBlur=36;
  ctx.fillStyle='#eef8ff';
  ctx.font=`bold ${t1sz}px Arial`;ctx.fillText('雨漏り',W/2,logoY+t1sz);
  ctx.restore();
  ctx.save();
  ctx.strokeStyle='rgba(60,180,255,0.50)';ctx.lineWidth=3;
  ctx.font=`bold ${t1sz}px Arial`;ctx.strokeText('雨漏り',W/2,logoY+t1sz);
  ctx.restore();
  const t2sz=Math.floor(W*0.120);
  const t2y=logoY+t1sz+t2sz*1.08;
  ctx.save();
  ctx.shadowColor='rgba(0,210,255,0.90)';ctx.shadowBlur=26;
  ctx.fillStyle='#66deff';
  ctx.font=`bold ${t2sz}px Arial`;ctx.fillText('パニック！',W/2,t2y);
  ctx.restore();
  ctx.save();
  ctx.strokeStyle='rgba(0,110,200,0.40)';ctx.lineWidth=2.5;
  ctx.font=`bold ${t2sz}px Arial`;ctx.strokeText('パニック！',W/2,t2y);
  ctx.restore();

  // ── スコア表示 ──
  const scoreFsz=Math.floor(W*0.042);
  const scoreAreaY=H*0.665;
  ctx.save();ctx.textAlign='center';
  ctx.fillStyle='rgba(180,230,255,0.80)';ctx.font=`${scoreFsz}px Arial`;
  ctx.fillText(`🏆 BEST: ${highScore} pt`,W/2,scoreAreaY);
  if(lastScore>0){
    ctx.fillStyle='rgba(150,210,255,0.60)';ctx.font=`${Math.floor(scoreFsz*0.88)}px Arial`;
    ctx.fillText(`前回: ${lastScore} pt`,W/2,scoreAreaY+scoreFsz*1.35);
  }
  ctx.restore();

  // ── ボタン ──
  const pulse=0.70+Math.sin(titleT*3.2)*0.30;
  const btnW=Math.floor(W*0.76),btnH=Math.floor(H*0.094);
  const btnX=(W-btnW)/2;
  const startY=H*0.755;
  const howtoY=startY+btnH+Math.floor(H*0.022);

  _drawTitleBtn(btnX,startY,btnW,btnH,'▶  スタート',true,pulse);
  _drawTitleBtn(btnX,howtoY,btnW,btnH,'?  遊び方',false,pulse*0.7);

  _titleStartBtnRect={x:btnX,y:startY,w:btnW,h:btnH};
  _titleHowtoBtnRect={x:btnX,y:howtoY,w:btnW,h:btnH};
}

function drawHowTo(){
  // ── 背景 ──
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#010918');bg.addColorStop(1,'#000a1e');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // 薄い雨
  for(const d of titleRain){
    ctx.save();ctx.globalAlpha=d.a*0.35;
    ctx.strokeStyle='rgba(120,200,255,1)';ctx.lineWidth=d.s*0.5;
    const dx=d.sl*d.l,dy=d.l;
    ctx.beginPath();ctx.moveTo(d.x-dx,d.y-dy);ctx.lineTo(d.x,d.y);ctx.stroke();
    ctx.restore();
  }

  ctx.textAlign='center';
  // タイトル
  const headSz=Math.floor(W*0.078);
  ctx.save();
  ctx.shadowColor='rgba(0,200,255,0.8)';ctx.shadowBlur=18;
  ctx.fillStyle='#b8ecff';
  ctx.font=`bold ${headSz}px Arial`;ctx.fillText('遊び方',W/2,H*0.11+headSz);
  ctx.restore();

  // 仕切り線
  ctx.strokeStyle='rgba(60,160,240,0.35)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(W*0.12,H*0.18);ctx.lineTo(W*0.88,H*0.18);ctx.stroke();

  // 説明リスト
  const items=[
    {icon:'🪣',text:'バケツをドラッグして\n雨水をキャッチしよう'},
    {icon:'💧',text:'バケツが満水になったら\n「水を捨てる」ボタンを押そう'},
    {icon:'🌊',text:'床が水浸しになると\nゲームオーバー！'},
    {icon:'🪤',text:'桶やたらいも活用して\n雨漏りを乗り切ろう'},
  ];
  const itemFsz=Math.floor(W*0.042);
  const iconSz=Math.floor(W*0.065);
  const rowH=(H*0.58)/items.length;
  const listTop=H*0.21;
  ctx.textAlign='left';
  items.forEach((item,i)=>{
    const iy=listTop+rowH*i+rowH*0.5;
    // 番号バッジ
    ctx.save();
    ctx.fillStyle='rgba(0,140,220,0.50)';
    ctx.beginPath();ctx.arc(W*0.11,iy-itemFsz*0.3,iconSz*0.55,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font=`bold ${iconSz}px Arial`;
    ctx.textAlign='center';ctx.fillText(item.icon,W*0.11,iy+iconSz*0.32);
    ctx.restore();
    // テキスト（改行対応）
    const lines=item.text.split('\n');
    ctx.fillStyle='rgba(210,240,255,0.90)';
    ctx.font=`${itemFsz}px Arial`;ctx.textAlign='left';
    lines.forEach((ln,li)=>{
      ctx.fillText(ln,W*0.20,iy+(li-0.2)*itemFsz*1.4);
    });
  });

  // ── もどるボタン ──
  const pulse=0.70+Math.sin(titleT*2.8)*0.30;
  const bW=Math.floor(W*0.60),bH=Math.floor(H*0.088);
  const bX=(W-bW)/2,bY=H*0.84;
  _drawTitleBtn(bX,bY,bW,bH,'←  もどる',false,pulse);
  _titleHowtoBtnRect={x:bX,y:bY,w:bW,h:bH};
}

function drawGameOver(){
  const a=Math.min(1,overT*2.2);

  // Rising flood water
  const floodProg=Math.min(1,overT*1.1);
  if(floodProg>0){
    const floodY=H*(1-floodProg*0.88);
    const fwg=ctx.createLinearGradient(0,floodY,0,H);
    fwg.addColorStop(0,'rgba(12,45,155,0.92)');fwg.addColorStop(1,'rgba(4,16,90,0.98)');
    ctx.fillStyle=fwg;ctx.fillRect(0,floodY,W,H-floodY);
    // Wave at water surface
    ctx.strokeStyle=`rgba(70,155,255,${0.55+Math.sin(overT*6)*0.15})`;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(0,floodY);
    for(let x=0;x<=W;x+=4)ctx.lineTo(x,floodY+Math.sin(x*0.09+overT*9)*5.5);
    ctx.stroke();
    // Bubbles in flood water
    ctx.fillStyle='rgba(95,175,255,0.40)';
    for(let b=0;b<10;b++){
      const bx2=((b*W*0.13+Math.sin(b*1.7)*W*0.15)+W)%W;
      const prog=(overT*22+b*13)%(H-floodY-5);
      const by2=floodY+5+prog;
      if(by2<H){ctx.beginPath();ctx.arc(bx2,by2,2+Math.sin(b*2.1+overT)*1.2,0,Math.PI*2);ctx.fill();}
    }
    // Caustic light shimmer at surface
    ctx.strokeStyle=`rgba(130,210,255,0.22)`;ctx.lineWidth=1;
    for(let x=0;x<W;x+=18){
      ctx.beginPath();ctx.moveTo(x,floodY);ctx.lineTo(x+Math.sin(x*0.2+overT*4)*8,floodY+Math.min(H-floodY,12));ctx.stroke();
    }
  }

  // Dark overlay
  ctx.fillStyle=`rgba(0,0,0,${a*0.60})`;ctx.fillRect(0,0,W,H);

  ctx.save();ctx.textAlign='center';ctx.globalAlpha=a;
  // Title
  ctx.fillStyle='#ff4018';ctx.shadowColor='#ff1500';ctx.shadowBlur=32;
  ctx.font=`bold ${Math.floor(W*0.15)}px Arial`;ctx.fillText('浸水！',W/2,H*0.22);ctx.shadowBlur=0;
  // Stats
  ctx.fillStyle='#e8d088';ctx.font=`bold ${Math.floor(W*0.072)}px Arial`;
  ctx.fillText(`${score} pt`,W/2,H*0.38);
  if(isNewHigh){
    const nhPulse=0.6+Math.sin(overT*6)*0.4;
    ctx.save();ctx.globalAlpha=a*nhPulse;
    ctx.fillStyle='#ffe050';ctx.shadowColor='#ffc000';ctx.shadowBlur=18;
    ctx.font=`bold ${Math.floor(W*0.052)}px Arial`;
    ctx.fillText('🏆 NEW BEST!',W/2,H*0.46);
    ctx.restore();
  }
  ctx.fillStyle='#a8c8e8';ctx.font=`${Math.floor(W*0.042)}px Arial`;
  ctx.fillText(`生存時間: ${Math.floor(timer)}秒`,W/2,isNewHigh?H*0.54:H*0.46);
  ctx.fillText(`天気レベル: ${W_LABEL[weatherIdx]}`,W/2,isNewHigh?H*0.60:H*0.52);
  if(overT>0.8){
    ctx.globalAlpha=a*(0.75+Math.sin(overT*4)*0.25);ctx.fillStyle='#c0d8f0';
    ctx.font=`bold ${Math.floor(W*0.050)}px Arial`;ctx.fillText('タップでもう一度',W/2,H*0.74);
  }
  ctx.globalAlpha=1;ctx.restore();
}

// ═══ INPUT ════════════════════════════════════════
function getPos(e){
  const r=canvas.getBoundingClientRect(),sx=W/r.width,sy=H/r.height;
  const touch=e.touches?e.touches[0]:e;
  return{x:(touch.clientX-r.left)*sx,y:(touch.clientY-r.top)*sy};
}
let dragging=false,draggingItemIdx=-1;

function deploySlot(idx){
  const slot=itemSlots[idx];
  if(!slot||slot.cooldownT>0)return;
  if(spawnedItems.some(si=>si.type===slot.type))return;
  if(spawnedItems.length>=3)return;
  const iw=getItemW(slot.type);
  const positions=[W*0.22,W*0.78,W*0.50];
  const usedX=spawnedItems.map(si=>si.x);
  let px=positions.find(p=>usedX.every(ux=>Math.abs(ux-p)>iw*0.6))||W/2;
  px=Math.max(iw/2+4,Math.min(W-iw/2-4,px));
  spawnedItems.push({type:slot.type,x:px,y:BUCKET_FLOOR_Y,water:0,max:slot.max,timeLeft:slot.dur,dur:slot.dur,color:slot.color,label:slot.label});
  playSE('deploy');
}

function onDown(e){
  e.preventDefault();initAudio();
  const pos=getPos(e);
  // 音量ボタン（常に最優先）
  if(Math.hypot(pos.x-(W-18),pos.y-98)<20){soundEnabled=!soundEnabled;return;}
  if(scene==='title'){
    const r=_titleHowtoBtnRect;
    if(pos.x>=r.x&&pos.x<=r.x+r.w&&pos.y>=r.y&&pos.y<=r.y+r.h){scene='howto';return;}
    const s=_titleStartBtnRect;
    if(pos.x>=s.x&&pos.x<=s.x+s.w&&pos.y>=s.y&&pos.y<=s.y+s.h){startGame();return;}
    return;
  }
  if(scene==='howto'){
    const r=_titleHowtoBtnRect;
    if(pos.x>=r.x&&pos.x<=r.x+r.w&&pos.y>=r.y&&pos.y<=r.y+r.h){scene='title';return;}
    return;
  }
  if(scene==='over'){scene='title';overT=0;return;}
  if(scene!=='play')return;
  // Item buttons (bottom)
  if(pos.y>=BTN_TOP){
    const idx=Math.floor(pos.x/SLOT_W);
    if(idx>=0&&idx<itemSlots.length)deploySlot(idx);
    return;
  }
  // 雑巾ハンドル（ダンプボタンより先にチェック）
  if(floorWater>0.02){
    const hy=ROOM_TOP+ROOM_H*0.91,hw=CELL*3.6+20,hh=Math.max(8,CELL*0.44)+24;
    if(Math.abs(pos.x-mopHandleX)<hw/2&&Math.abs(pos.y-hy)<hh/2){
      mopDrag={reduced:0};return;
    }
  }
  // Dump button
  if(pos.y>=DUMP_BTN_Y&&pos.y<=DUMP_BTN_Y+DUMP_BTN_H){dumpBucket();return;}
  if(pos.y<ROOM_TOP)return;
  // Drag spawned items
  for(let i=0;i<spawnedItems.length;i++){
    const si=spawnedItems[i],iw=getItemW(si.type),ih=getItemH(si.type);
    if(Math.abs(pos.x-si.x)<iw/2+14&&pos.y>=si.y-ih-12&&pos.y<=si.y+12){
      dragging=true;draggingItemIdx=i;return;
    }
  }
  dragging=true;draggingItemIdx=-1;
}
function onMove(e){
  e.preventDefault();
  if(scene!=='play')return;
  const pos=getPos(e);
  if(mopDrag){
    const dx=Math.abs(pos.x-mopHandleX);
    const red=Math.min(dx*0.00055,Math.max(0,0.20-mopDrag.reduced));
    if(red>0){floorWater=Math.max(0,floorWater-red);mopDrag.reduced+=red;}
    mopHandleX=Math.max(20,Math.min(W-20,pos.x));return;
  }
  if(!dragging)return;
  if(draggingItemIdx>=0&&draggingItemIdx<spawnedItems.length){
    const si=spawnedItems[draggingItemIdx],iw=getItemW(si.type);
    si.x=Math.max(iw/2+4,Math.min(W-iw/2-4,pos.x));
  }else{
    const bw=getBW();bucket.x=Math.max(bw/2+4,Math.min(W-bw/2-4,pos.x));
  }
}
function onUp(e){e.preventDefault();dragging=false;draggingItemIdx=-1;mopDrag=null;}
function dumpBucket(){if(bucket.dumping||bucket.water<2)return;bucket.dumping=true;bucket.dumpT=0;playSE('dump');}

canvas.addEventListener('mousedown',onDown);canvas.addEventListener('mousemove',onMove);canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',onDown,{passive:false});canvas.addEventListener('touchmove',onMove,{passive:false});canvas.addEventListener('touchend',onUp,{passive:false});

lastTs=performance.now();loop(lastTs);
</script>
