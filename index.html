let BAR_H=0,CEIL_H=0,ROOM_H=0,BTN_H=0;
let GRID_TOP=0,ROOM_TOP=0,BTN_TOP=0;
let BUCKET_FLOOR_Y=0,DUMP_BTN_Y=0,DUMP_BTN_H=0;
let SLOT_W=0;

function layout(){
  const app=document.getElementById('app');
  const vw=app.clientWidth||window.innerWidth;
  const vh=app.clientHeight||window.innerHeight;
  W=Math.min(vw,480);
  CELL=Math.floor((W-8)/COLS);W=CELL*COLS+8;GX=4;
  CEIL_H=Math.floor(CELL*0.28)+ROWS*CELL+Math.floor(CELL*0.22);
  BTN_H=Math.max(52,Math.floor(vh*0.10));
  // BAR_H・ROOM_H をビューポート残り高さで計算してスクリーンを埋める
  const capVh=Math.min(vh,W*2.2);  // 横長デスクトップで極端に縦長になるのを防止
  const remaining=capVh-CEIL_H-BTN_H;
  BAR_H=Math.floor(remaining*0.42);   // 上部雨エリア 42%
  ROOM_H=remaining-BAR_H;             // 下部部屋エリア 58%
  H=BAR_H+CEIL_H+ROOM_H+BTN_H;
  canvas.width=W;canvas.height=H;
  GRID_TOP=BAR_H+Math.floor(CELL*0.28);
  ROOM_TOP=BAR_H+CEIL_H;
  BTN_TOP=ROOM_TOP+ROOM_H;
  BUCKET_FLOOR_Y=ROOM_TOP+Math.floor(ROOM_H*0.60);
  DUMP_BTN_H=Math.floor(ROOM_H*0.18);
  DUMP_BTN_Y=ROOM_TOP+Math.floor(ROOM_H*0.65);
  SLOT_W=Math.floor(W/SLOT_DEFS.length);
  const scale=Math.min(vw/W,vh/H);
  canvas.style.width=(W*scale)+'px';canvas.style.height=(H*scale)+'px';
}
layout();
window.addEventListener('resize',()=>{layout();});
if(window.visualViewport){window.visualViewport.addEventListener('resize',()=>{layout();});}

// ═══ AUDIO ═══════════════════════════════════════
let AC=null;
function initAudio(){
  if(!AC){AC=new(window.AudioContext||window.webkitAudioContext)();['drip1','drip2','drip3','warn'].forEach(k=>_loadBuf(k));}
  if(AC.state==='suspended')AC.resume();
}
function playSE(type,opt){
  if(!AC||!soundEnabled)return;
  // ── 日本TV緊急警報：EEW風5音上昇 + LFOウォーブルサイレン ──────────────
  if(type==='warn'){_playBuf('warn',0.85);return;}
  // ── バケツ・タライ着水音：水位3段階でMP3切り替え ─────────────────────────
  if(type==='drip_bucket'||type==='drip_tub'){
    const fill=opt||0;
    const key=fill<0.33?'drip1':fill<0.66?'drip2':'drip3';
    _playBuf(key,0.90);return;
  }
  // ── シンプルな単一オシレータSE ──────────────────────────────────────────
  const g=AC.createGain();g.connect(AC.destination);
  const o=AC.createOscillator();o.connect(g);
  if(type==='dump'){
    o.type='sine';o.frequency.setValueAtTime(280,AC.currentTime);o.frequency.exponentialRampToValueAtTime(160,AC.currentTime+0.35);
    g.gain.setValueAtTime(0.09,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.35);
    o.start();o.stop(AC.currentTime+0.35);
  }else if(type==='over'){
    o.type='sawtooth';o.frequency.setValueAtTime(300,AC.currentTime);o.frequency.linearRampToValueAtTime(60,AC.currentTime+1.0);
    g.gain.setValueAtTime(0.14,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+1.0);
    o.start();o.stop(AC.currentTime+1.0);
  }else if(type==='rotate'){
    o.type='triangle';o.frequency.setValueAtTime(350,AC.currentTime);o.frequency.exponentialRampToValueAtTime(550,AC.currentTime+0.18);
    g.gain.setValueAtTime(0.04,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.18);
    o.start();o.stop(AC.currentTime+0.18);
  }else if(type==='thunder'){
    o.type='sawtooth';o.frequency.setValueAtTime(100,AC.currentTime);o.frequency.linearRampToValueAtTime(25,AC.currentTime+0.7);
    g.gain.setValueAtTime(0.20,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.9);
    o.start();o.stop(AC.currentTime+0.9);
  }else if(type==='deploy'){
    [480,680].forEach((f,i)=>{
      const oo=AC.createOscillator(),gg=AC.createGain();oo.frequency.value=f;oo.type='sine';
      gg.gain.setValueAtTime(0,AC.currentTime+i*0.07);gg.gain.linearRampToValueAtTime(0.07,AC.currentTime+i*0.07+0.04);
      gg.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+i*0.07+0.18);
      oo.connect(gg);gg.connect(AC.destination);oo.start();oo.stop(AC.currentTime+i*0.07+0.18);
    });
  }
}

// ═══ PIPE GRID ═══════════════════════════════════
let grid=[];
let SOURCE_COLS=[2,5,9];
function makeCell(type,rot,locked){return{type,rot,hasWater:false,locked:!!locked};}
function gIdx(r,c){return r*COLS+c;}
function gCell(r,c){return grid[gIdx(r,c)];}
function canConn(r1,c1,d){
  const r2=r1+DIR_OFF[d][0],c2=c1+DIR_OFF[d][1];
  if(r2<0||r2>=ROWS||c2<0||c2>=COLS)return false;
  return PCONN[gCell(r1,c1).type][gCell(r1,c1).rot][d]
      &&PCONN[gCell(r2,c2).type][gCell(r2,c2).rot][OPP[d]];
}
function calcFlow(){
  for(const c of grid)c.hasWater=false;
  const vis=new Set();
  function dfs(r,c){
    if(r<0||r>=ROWS||c<0||c>=COLS)return;
    const k=r+','+c;if(vis.has(k))return;vis.add(k);
    grid[gIdx(r,c)].hasWater=true;
    for(let d=0;d<4;d++)if(canConn(r,c,d))dfs(r+DIR_OFF[d][0],c+DIR_OFF[d][1]);
  }
  for(const sc of SOURCE_COLS){
    if(sc>=0&&sc<COLS&&PCONN[gCell(0,sc).type][gCell(0,sc).rot][DIR_N])dfs(0,sc);
  }
}
// ソース列をL字パスで固定（偶数列→右曲がり, 奇数列→左曲がり）
function setSourcePaths(){
  for(const sc of SOURCE_COLS){
    const goRight=(sc%2===0);
    const sc2=goRight?sc+1:sc-1;
    if(sc2<0||sc2>=COLS)continue;
    grid[gIdx(0,sc)]=makeCell(P_I,0,true);         // row0: 縦直線(N+S)
    if(goRight){
      grid[gIdx(1,sc)] =makeCell(P_L,0,true);      // row1 sc : N+E → 右L字
      grid[gIdx(1,sc2)]=makeCell(P_L,2,true);      // row1 sc+1: S+W
    }else{
      grid[gIdx(1,sc)] =makeCell(P_L,3,true);      // row1 sc : N+W → 左L字
      grid[gIdx(1,sc2)]=makeCell(P_L,1,true);      // row1 sc-1: E+S
    }
    grid[gIdx(2,sc2)]=makeCell(P_T,1,true);        // row2 sc2: N+S+W → 出口
  }
}
function getExits(){
  const ex=[];
  for(let c=0;c<COLS;c++){
    const cell=gCell(ROWS-1,c);
    if(cell.hasWater&&PCONN[cell.type][cell.rot][DIR_S])ex.push(c);
  }
  return ex;
}

function getItemW(type){return type==='tub'?CELL*3.8:CELL*2.0;}
function getItemH(type){return type==='tub'?CELL*1.3:CELL*1.6;}

// ═══ GAME STATE ══════════════════════════════════
let scene='title';
let score=0,timer=0;
let rotTimer=4,rotAnim=null;
let weatherIdx=1,weatherTimer=22,warnPlayed=false;
let lightningT=8,lightningFlash=0;
let drips=[],exitTimers={},noExitTimer=0;
let bucket={x:0,water:0,max:100,dumping:false,dumpT:0,shakeT:0};
let floorWater=0,puddles=[],ripples=[];
let rainDrops=[],crackPaths=[];
let t=0,overT=0,titleT=0;
let lastTs=0;
let spawnedItems=[];
let itemSlots=[];
let ceilStains=[],splashParticles=[];
let screenShakeX=0,screenShakeY=0,screenShakeT=0;
let rainIntensity=0.30,rainIntensityTarget=0.35,rainLullTimer=3;
let pendingDrag=null,mopDrag=null,mopHandleX=0,evapParticles=[];
let soundEnabled=true;
let titleRain=[],titleRainInited=false;
let _titleStartBtnRect={x:0,y:0,w:0,h:0},_titleHowtoBtnRect={x:0,y:0,w:0,h:0};
let highScore=parseInt(sessionStorage.getItem('rainDrainHi')||'0');
let lastScore=0,isNewHigh=false;
let weatherTransitionT=0;
let heavyRainAccum=0,forcedCalmTimer=0,calmScaleAccum=0;
let snail=null;

function getBW(){return CELL*2.4;}
function getBH(){return CELL*1.92;}

function resetSlots(){
  itemSlots=SLOT_DEFS.map(d=>({...d,cooldownT:d.cooldownMax*0.18}));
}
function initGrid(){
  grid=[];
  const T=[P_I,P_L,P_L,P_T];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)
    grid.push(makeCell(T[Math.floor(Math.random()*T.length)],Math.floor(Math.random()*4)));
  setSourcePaths();
  calcFlow();
}
function genCracks(){
  crackPaths=[];
  for(const sc of SOURCE_COLS){
    const cx=GX+sc*CELL+CELL/2,cy=BAR_H+5;
    const pts=[{x:0,y:0}];let px=0,py=0;
    for(let i=0;i<4;i++){px+=Math.sin(i*2.3+sc)*CELL*0.22;py+=CELL*0.14+i*1.5;pts.push({x:px,y:py});}
    crackPaths.push({cx,cy,pts});
    const bpts=[{x:pts[2].x,y:pts[2].y}];let bx2=pts[2].x,by2=pts[2].y;
    for(let i=0;i<2;i++){bx2+=Math.cos(i*1.7+sc+2)*CELL*0.18;by2+=CELL*0.10;bpts.push({x:bx2,y:by2});}
    crackPaths.push({cx,cy,pts:bpts,branch:true});
  }
}
function setGameOver(){
  lastScore=score;
  isNewHigh=score>highScore;
  if(isNewHigh){highScore=score;sessionStorage.setItem('rainDrainHi',highScore);}
  window.parent.postMessage({type:'gameOver',score:score},'*');
  scene='over';overT=0;playSE('over');
}
function startGame(){
  SOURCE_COLS=[5];initGrid();genCracks();
  score=0;timer=0;rotTimer=4;rotAnim=null;
  weatherIdx=0;weatherTimer=W_DURATION[0];warnPlayed=false;
  lightningT=10;lightningFlash=0;
  drips=[];exitTimers={};noExitTimer=0;
  bucket={x:W/2,water:0,max:120,dumping:false,dumpT:0,shakeT:0};
  floorWater=0;puddles=[];ripples=[];
  rainDrops=[];
  const n=90+Math.floor(W*0.55);
  for(let i=0;i<n;i++)rainDrops.push({x:Math.random()*W,y:Math.random()*BAR_H,s:1.2+Math.random()*3.5,l:5+Math.random()*10,a:0.35+Math.random()*0.65,sl:0.15+Math.random()*0.2});
  spawnedItems=[];resetSlots();
  ceilStains=[];splashParticles=[];
  screenShakeX=0;screenShakeY=0;screenShakeT=0;
  rainIntensity=0.22;rainIntensityTarget=0.34;rainLullTimer=3;
  weatherTransitionT=0;heavyRainAccum=0;forcedCalmTimer=0;calmScaleAccum=0;
  pendingDrag=null;mopDrag=null;mopHandleX=W/2;evapParticles=[];
  initSnail();
  scene='play';
}

function addSplash(x,y,isBucket){
  const n=isBucket?10:14,spd=isBucket?18:28;
  for(let i=0;i<n;i++){
    const spread=(Math.random()-0.5)*2;
    const v=spd*(0.65+Math.random()*0.8);
    splashParticles.push({x,y,vx:spread*v*0.80,vy:-(v*(0.55+Math.random()*0.7)),
      r:(isBucket?1.8:2.8)+Math.random()*2.2,alpha:0.95,isBucket});
  }
}

// ═══ UPDATE ══════════════════════════════════════
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastTs)/1000,0.05);lastTs=ts;
  t+=dt;titleT+=dt;
  if(screenShakeT>0){screenShakeT=Math.max(0,screenShakeT-dt);const si2=screenShakeT*10;screenShakeX=(Math.random()-0.5)*si2;screenShakeY=(Math.random()-0.5)*si2*0.6;}else{screenShakeX=0;screenShakeY=0;}
  if(scene==='play')update(dt);
  if(scene==='over')overT+=dt;
  if(scene==='title'||scene==='howto')updateTitleRain(dt);
  draw();
}

function update(dt){
  timer+=dt;
  updateSnail(dt);
  score=Math.floor(timer*12*(1+weatherIdx*0.6));

  // ── 梅雨の強弱 (rain intensity fluctuation) ──
  rainLullTimer-=dt;
  if(forcedCalmTimer>0){
    // 強制静穏：激しい雨の後の回復期間
    forcedCalmTimer-=dt;
    if(rainLullTimer<=0){
      rainIntensityTarget=0.05+Math.random()*0.09;
      rainLullTimer=1.5+Math.random()*2.0;
    }
  }else{
    if(rainLullTimer<=0){
      // フェーズ遷移直後は旧フェーズとのブレンドで緩やかに上げる
      const tr=weatherTransitionT>0?Math.min(1,weatherTransitionT/5):0;
      const loArr=[0.16,0.18,0.28,0.48],hiArr=[0.38,0.68,0.94,1.00];
      const prevIdx=Math.max(0,weatherIdx-1);
      const lo=loArr[weatherIdx]*(1-tr)+loArr[prevIdx]*tr;
      const hi=hiArr[weatherIdx]*(1-tr)+hiArr[prevIdx]*tr;
      const isLull=weatherIdx>=1&&Math.random()<0.28;
      rainIntensityTarget=isLull?lo*(0.3+Math.random()*0.5):lo+Math.random()*(hi-lo);
      rainLullTimer=(isLull?5:2.5)+Math.random()*8;
    }
    // 高強度降雨の累積トラッキング
    if(weatherIdx>=2&&rainIntensity>0.70){
      heavyRainAccum+=dt;
    }else{
      heavyRainAccum=Math.max(0,heavyRainAccum-dt*0.25);
    }
    // 累積閾値を超えたら強制静穏を起動（回数に比例して長くなる）
    if(heavyRainAccum>9){
      calmScaleAccum+=0.4;
      forcedCalmTimer=5+calmScaleAccum*2.0;
      heavyRainAccum=0;
      rainLullTimer=0;
    }
  }
  if(weatherTransitionT>0)weatherTransitionT=Math.max(0,weatherTransitionT-dt);
  // Intensity smoothly follows target (rises fast, fades slowly)
  const iSpd=rainIntensityTarget>rainIntensity?0.50:0.20;
  rainIntensity+=(rainIntensityTarget-rainIntensity)*Math.min(1,iSpd*dt);

  if(weatherIdx<3){
    weatherTimer-=dt;
    if(weatherTimer<5&&!warnPlayed){warnPlayed=true;playSE('warn');}
    if(weatherTimer<=0){
      weatherIdx++;weatherTimer=weatherIdx<3?W_DURATION[weatherIdx]:9999;warnPlayed=false;
      weatherTransitionT=5; // フェーズ遷移後5秒かけて難易度を緩やかに上げる
      if(weatherIdx===1)SOURCE_COLS=[...new Set([...SOURCE_COLS,9])];        // 1→2列
      if(weatherIdx===2)SOURCE_COLS=[...new Set([...SOURCE_COLS,2,7])];    // 2→4列
      if(weatherIdx===3)SOURCE_COLS=[...new Set([...SOURCE_COLS,0,11])];   // 4→6列
      SOURCE_COLS=SOURCE_COLS.filter(c=>c>=0&&c<COLS);
      genCracks();setSourcePaths();calcFlow();
    }
  }

  // Lightning in storm (also at 大雨 + high intensity)
  if(weatherIdx===3||(weatherIdx===2&&rainIntensity>0.88)){
    lightningT-=dt;
    if(lightningT<=0){
      lightningFlash=1.0;
      lightningT=(weatherIdx===3?2.5:4)+Math.random()*5;
      playSE('thunder');screenShakeT=weatherIdx===3?0.50:0.28;
    }
    lightningFlash=Math.max(0,lightningFlash-dt*7);
  }else{lightningFlash=Math.max(0,lightningFlash-dt*7);}

  // Rain drop movement scales with intensity
  const iMove=0.45+rainIntensity*0.80;
  for(const d of rainDrops){
    d.y+=d.s*(0.4+weatherIdx*1.0)*iMove*dt*60;
    d.x+=d.sl*(weatherIdx>1?1.8:0.8)*iMove*dt*60;
    if(d.y>BAR_H||d.x>W){d.y=-d.l;d.x=Math.random()*W;}
  }

  // Ceiling stains grow at each source column
  for(const sc of SOURCE_COLS){
    let s=ceilStains.find(cs=>cs.col===sc);
    if(!s){s={col:sc,size:CELL*0.4,alpha:0.04};ceilStains.push(s);}
    s.size=Math.min(CELL*(1.8+weatherIdx*1.4),s.size+dt*(0.30+weatherIdx*0.50)*CELL);
    s.alpha=Math.min(0.58+weatherIdx*0.08,s.alpha+dt*0.035);
  }
  // Splash particles physics
  for(let i=splashParticles.length-1;i>=0;i--){
    const p=splashParticles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=230*dt;
    p.alpha-=dt*(p.vy>60?5.5:3.0);
    if(p.alpha<=0||p.y>ROOM_TOP+ROOM_H)splashParticles.splice(i,1);
  }

  rotTimer-=dt;
  if(rotTimer<=0&&!rotAnim){
    // Rotation speed: faster when rain is intense
    rotTimer=W_ROT_INTERVAL[weatherIdx]*(0.75+Math.random()*0.5)/(0.45+rainIntensity*0.78);
    let tries=20;
    while(tries-->0){
      const r=Math.floor(Math.random()*ROWS),c=Math.floor(Math.random()*COLS);
      if(gCell(r,c).locked)continue; // lockedセルはロック
      const cell=gCell(r,c);
      const newRot=(cell.rot+1+Math.floor(Math.random()*2))%4;
      if(newRot===cell.rot)continue;
      rotAnim={r,c,fromRot:cell.rot,toRot:newRot,t:0,duration:0.22};playSE('rotate');break;
    }
  }
  if(rotAnim){
    rotAnim.t+=dt/rotAnim.duration;
    if(rotAnim.t>=1){gCell(rotAnim.r,rotAnim.c).rot=rotAnim.toRot;rotAnim=null;calcFlow();}
  }

  const exits=getExits();
  // 出口なし2.5秒でソース列を縦一直線に強制（最大3秒保証）
  if(exits.length===0){
    noExitTimer+=dt;
    if(noExitTimer>2.5&&!rotAnim){
      setSourcePaths();calcFlow();noExitTimer=0;
    }
  }else{noExitTimer=0;}
  const isSunny=(weatherIdx===0&&rainIntensity<0.26);
  const baseRate=W_DRIP[weatherIdx];
  const iFactor=0.38+rainIntensity*1.24;
  if(!isSunny){
    const snailBlockedCol=snail&&snail.blocking?snail.c:-1;
    for(const ec of exits){
      if(ec===snailBlockedCol)continue; // カタツムリがパイプを詰まらせている
      if(exitTimers[ec]===undefined)exitTimers[ec]=0.1+Math.random()*0.2;
      exitTimers[ec]-=dt;
      if(exitTimers[ec]<=0){
        drips.push({x:GX+ec*CELL+CELL/2+(Math.random()-0.5)*CELL*0.3,y:GRID_TOP+ROWS*CELL,vy:90+Math.random()*90*(1+weatherIdx*0.4),r:3.5+Math.random()*2.5});
        exitTimers[ec]=Math.max(0.04,1/(baseRate*iFactor*(0.8+Math.random()*0.4)));
      }
    }
  }

  const bw=getBW(),bh=getBH(),bucketRimY=BUCKET_FLOOR_Y-bh+4;
  for(let i=drips.length-1;i>=0;i--){
    const d=drips[i];
    d.y+=d.vy*dt;
    if(d.y>=bucketRimY){
      let caught=false;
      if(!bucket.dumping&&Math.abs(d.x-bucket.x)<bw/2-4){
        bucket.water=Math.min(bucket.max,bucket.water+d.r*(0.7+weatherIdx*0.10));
        bucket.shakeT=0.15;
        addSplash(d.x,bucketRimY,true);
        if(bucket.water>=bucket.max){setGameOver();return;}
        playSE('drip_bucket',bucket.water/bucket.max);
        caught=true;
      }
      if(!caught){
        for(const si of spawnedItems){
          if(Math.abs(d.x-si.x)<getItemW(si.type)/2-4){
            si.water=Math.min(si.max,si.water+d.r*(0.7+weatherIdx*0.10));
            addSplash(d.x,si.y-getItemH(si.type)*0.92,true);
            if(si.water>=si.max){floorWater=Math.min(1,floorWater+0.04);si.timeLeft=0;}
            playSE(si.type==='tub'?'drip_tub':'drip_bucket',si.water/si.max);
            caught=true;break;
          }
        }
      }
      if(!caught){
        floorWater=Math.min(1,floorWater+0.009*(1+weatherIdx*0.45));
        ripples.push({x:d.x,y:BUCKET_FLOOR_Y+6,r:0,alpha:0.6});
        puddles.push({x:d.x,r:3+Math.random()*4,t:0});
        addSplash(d.x,BUCKET_FLOOR_Y,false);
        if(floorWater>=1){setGameOver();return;}
      }
      drips.splice(i,1);
    }else if(d.y>H+20)drips.splice(i,1);
  }

  for(let i=ripples.length-1;i>=0;i--){ripples[i].r+=dt*55;ripples[i].alpha-=dt*1.8;if(ripples[i].alpha<=0)ripples.splice(i,1);}
  for(let i=puddles.length-1;i>=0;i--){puddles[i].t+=dt;if(puddles[i].t>8)puddles.splice(i,1);}
  if(bucket.dumping){bucket.dumpT+=dt;if(bucket.dumpT>0.65){bucket.dumping=false;bucket.water=0;bucket.dumpT=0;}}
  if(bucket.shakeT>0)bucket.shakeT-=dt;

  for(const s of itemSlots){if(s.cooldownT>0)s.cooldownT=Math.max(0,s.cooldownT-dt);}
  for(let i=spawnedItems.length-1;i>=0;i--){
    spawnedItems[i].timeLeft-=dt;
    if(spawnedItems[i].timeLeft<=0){
      ripples.push({x:spawnedItems[i].x,y:BUCKET_FLOOR_Y,r:5,alpha:0.9});
      const slot=itemSlots.find(s=>s.type===spawnedItems[i].type);
      if(slot)slot.cooldownT=slot.cooldownMax;
      spawnedItems.splice(i,1);
    }
  }

  // ── 案2: 晴れ間に床の水が蒸発 ─────────────────────────────────────────
  if(rainIntensity<0.22&&floorWater>0){
    const evRate=(0.22-rainIntensity)/0.22*0.030;
    floorWater=Math.max(0,floorWater-evRate*dt);
    if(Math.random()<evRate*22*dt)
      evapParticles.push({x:GX+Math.random()*(W-GX*2),y:ROOM_TOP+ROOM_H,vy:-(4+Math.random()*10),alpha:0.20+Math.random()*0.14,r:1.5+Math.random()*2.5,vx:(Math.random()-0.5)*8});
  }
  for(let i=evapParticles.length-1;i>=0;i--){
    const p=evapParticles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.alpha-=dt*0.52;
    if(p.alpha<=0)evapParticles.splice(i,1);
  }
}

// ═══ SNAIL ═══════════════════════════════════════
function initSnail(){
  const c=Math.floor(COLS/2);
  snail={r:0,c,x:GX+c*CELL+CELL/2,y:GRID_TOP+CELL*0.52,
    fromX:0,fromY:0,toX:0,toY:0,
    moveT:1.0,waitT:2.5+Math.random()*1.5,
    dir:1,legT:0,blocking:false,
    burstCols:[],burstCount:0,burstTimer:0};
}

function moveSnailToNext(){
  if(!snail)return;
  if(snail.blocking){
    const ce=getExits();
    snail.burstCols=ce.filter(ec=>ec===snail.c);
    if(!snail.burstCols.length&&ce.length)snail.burstCols=[ce[0]];
    snail.burstCount=4+Math.floor(Math.random()*3);
    snail.burstTimer=0;
  }
  // 隣接セルをランダムに選ぶ（等確率）
  const opts=[];
  for(const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]){
    const nr=snail.r+dr,nc=snail.c+dc;
    if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)opts.push({r:nr,c:nc,dc,w:1});
  }
  if(!opts.length)return;
  let rnd=Math.random()*opts.reduce((s,o)=>s+o.w,0);
  let ch=opts[0];
  for(const o of opts){rnd-=o.w;if(rnd<=0){ch=o;break;}}
  snail.fromX=snail.x;snail.fromY=snail.y;
  snail.toX=GX+ch.c*CELL+CELL/2;snail.toY=GRID_TOP+ch.r*CELL+CELL*0.52;
  snail.r=ch.r;snail.c=ch.c;snail.moveT=0;
  if(ch.dc>0)snail.dir=1;else if(ch.dc<0)snail.dir=-1;
}

function updateSnail(dt){
  if(!snail)return;
  snail.legT+=dt;
  // 解放後のバースト雫
  if(snail.burstCount>0){
    snail.burstTimer-=dt;
    if(snail.burstTimer<=0){
      for(const bc of snail.burstCols)
        drips.push({x:GX+bc*CELL+CELL/2+(Math.random()-0.5)*CELL*0.25,
          y:GRID_TOP+ROWS*CELL,
          vy:175+Math.random()*90*(1+weatherIdx*0.4),r:5.5+Math.random()*2.5});
      snail.burstCount--;snail.burstTimer=0.07;
    }
  }
  if(snail.moveT<1.0){
    snail.moveT=Math.min(1.0,snail.moveT+dt/0.38);
    const e=snail.moveT<0.5?2*snail.moveT*snail.moveT:1-Math.pow(-2*snail.moveT+2,2)/2;
    snail.x=snail.fromX+(snail.toX-snail.fromX)*e;
    snail.y=snail.fromY+(snail.toY-snail.fromY)*e;
    if(snail.moveT>=1.0){snail.y=snail.toY;snail.waitT=1.8+Math.random()*1.8;}
  }else{
    const cell=gCell(snail.r,snail.c);
    snail.blocking=!!(cell&&cell.hasWater);
    snail.waitT-=dt;
    if(snail.waitT<=0)moveSnailToNext();
  }
}

function drawSnailSprite(){
  const sx=snail.x,sy=snail.y,s=CELL*0.55,fr=snail.dir>0,lt=snail.legT;
  // ── 伸び縮みパラメータ ──
  const mt=snail.moveT,isMoving=mt<1.0;
  const stretch=isMoving?Math.sin(mt*Math.PI)*0.44:0;
  const movX=snail.toX-snail.fromX,movY=snail.toY-snail.fromY;
  const isHoriz=!isMoving||Math.abs(movX)>=Math.abs(movY);
  // 胴体スケール: 移動方向に伸び、垂直方向に縮む
  const bScX=isHoriz?1+stretch:1-stretch*0.40;
  const bScY=isHoriz?1-stretch*0.40:1+stretch;
  // 殻が胴体より遅れる量
  const shLagX=isHoriz?-stretch*s*0.30:0;
  const shLagY=isHoriz?0:-Math.sign(movY||1)*stretch*s*0.28;

  ctx.save();
  ctx.translate(sx,sy);if(!fr)ctx.scale(-1,1);
  // 影（移動時は方向に伸びる）
  ctx.globalAlpha=0.18;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(0,s*0.40,s*0.58*bScX,s*0.12,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  // ブロック中はゴールドの輪
  if(snail.blocking){
    const pulse=0.45+Math.sin(lt*4.5)*0.35;
    ctx.strokeStyle=`rgba(255,205,60,${pulse})`;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(0,0,s*0.74,0,Math.PI*2);ctx.stroke();
  }
  // 胴体（伸び縮みする楕円）
  const bg=ctx.createLinearGradient(-s*0.55,-s*0.12,-s*0.55,s*0.32);
  bg.addColorStop(0,'#f6f2e4');bg.addColorStop(1,'#ddd0a0');
  ctx.fillStyle=bg;
  ctx.beginPath();ctx.ellipse(0,s*0.10,s*0.60*bScX,s*0.28*bScY,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(165,140,80,0.48)';ctx.lineWidth=0.8;ctx.stroke();
  // 腹足（移動中のみ下縁に波紋）
  if(isMoving){
    const wv=Math.sin(lt*11)*s*0.08;
    ctx.fillStyle='rgba(210,185,110,0.35)';
    ctx.beginPath();ctx.ellipse(wv,s*0.31,s*0.38*bScX,s*0.09,0,0,Math.PI*2);ctx.fill();
  }
  // 殻（胴体より遅れて追従）
  const shX=s*0.12+shLagX,shY=-s*0.24+shLagY,shR=s*0.46;
  const shG=ctx.createRadialGradient(shX-shR*0.30,shY-shR*0.30,shR*0.08,shX,shY,shR);
  shG.addColorStop(0,'#cdd8a5');shG.addColorStop(0.45,'#94a86a');shG.addColorStop(1,'#5f7040');
  ctx.fillStyle=shG;ctx.beginPath();ctx.arc(shX,shY,shR,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(42,52,16,0.32)';ctx.lineWidth=0.8;ctx.stroke();
  ctx.fillStyle='rgba(255,255,220,0.22)';
  ctx.beginPath();ctx.ellipse(shX-shR*0.25,shY-shR*0.28,shR*0.28,shR*0.16,-0.45,0,Math.PI*2);ctx.fill();
  // 殻スパイラル
  ctx.strokeStyle='rgba(36,48,14,0.56)';ctx.lineWidth=1.0;ctx.beginPath();
  for(let a=0;a<=Math.PI*4.6;a+=0.12){
    const ar=shR*0.07+a/(Math.PI*4.6)*shR*0.36;
    a===0?ctx.moveTo(shX+ar,shY):ctx.lineTo(shX+ar*Math.cos(a),shY+ar*Math.sin(a)*0.76);
  }
  ctx.stroke();
  // 触角 + 目（顔は常に前端）
  const fX=-s*0.44*bScX,ew=Math.sin(lt*2.8)*0.04;
  ctx.strokeStyle='#ccc09a';ctx.lineWidth=s*0.09;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(fX+s*0.10,-s*0.12);
  ctx.quadraticCurveTo(fX+s*0.08,-s*0.30,fX+s*0.07+ew*s,-s*0.42);ctx.stroke();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(fX+s*0.07+ew*s,-s*0.42,s*0.090,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(fX+s*0.10+ew*s,-s*0.44,s*0.055,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#ccc09a';ctx.lineWidth=s*0.09;
  ctx.beginPath();ctx.moveTo(fX-s*0.01,-s*0.09);
  ctx.quadraticCurveTo(fX-s*0.04,-s*0.26,fX-s*0.07-ew*s,-s*0.37);ctx.stroke();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(fX-s*0.07-ew*s,-s*0.37,s*0.080,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(fX-s*0.04-ew*s,-s*0.39,s*0.050,0,Math.PI*2);ctx.fill();
  // 笑顔
  ctx.strokeStyle='rgba(140,105,50,0.70)';ctx.lineWidth=0.85;ctx.lineCap='butt';
  ctx.beginPath();ctx.arc(fX+s*0.05,s*0.04,s*0.10,0.22,Math.PI-0.22);ctx.stroke();
  ctx.restore();
}

// ═══ DRAW ════════════════════════════════════════
function draw(){
  ctx.fillStyle='#080610';ctx.fillRect(0,0,W,H);
  ctx.save();
  if(screenShakeX||screenShakeY)ctx.translate(screenShakeX,screenShakeY);
  if(scene==='play'||scene==='over'){drawTopBar();drawCeiling();drawRoom();drawItemButtons();}
  if(scene==='title')drawTitle();
  if(scene==='howto')drawHowTo();
  if(scene==='over')drawGameOver();
  ctx.restore();
  // Whole-room lightning ambient flash
  if(lightningFlash>0&&(weatherIdx===3||(weatherIdx===2&&rainIntensity>0.80))){
    ctx.fillStyle=`rgba(195,220,255,${lightningFlash*(weatherIdx===3?0.16:0.09)})`;
    ctx.fillRect(0,0,W,H);
  }
  // ── スコア・生存時間（最前面）──
  if(scene==='play'){
    ctx.textAlign='right';
    ctx.fillStyle='rgba(0,0,0,0.42)';
    const fsz=Math.max(12,Math.floor(BAR_H*0.15));
    ctx.font=`bold ${fsz}px Arial`;
    ctx.fillText(`${score}pt`,W-6,BAR_H*0.62+2);
    ctx.fillStyle='#d8f0c0';ctx.fillText(`${score}pt`,W-8,BAR_H*0.62);
    const fsz2=Math.max(10,Math.floor(BAR_H*0.13));
    ctx.font=`${fsz2}px Arial`;
    ctx.fillStyle='rgba(0,0,0,0.38)';ctx.fillText(`${Math.floor(timer)}s`,W-6,BAR_H*0.78+2);
    ctx.fillStyle='#a0c890';ctx.fillText(`${Math.floor(timer)}s`,W-8,BAR_H*0.78);
  }
  // ── 音量ON/OFFボタン（右上隅・最前面）──
  {
    const sbcx=W-18,sbcy=98,sbr=14;
    ctx.fillStyle='rgba(0,0,0,0.48)';
    ctx.beginPath();ctx.arc(sbcx,sbcy,sbr,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=soundEnabled?'rgba(160,255,160,0.65)':'rgba(255,120,120,0.65)';
    ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(sbcx,sbcy,sbr,0,Math.PI*2);ctx.stroke();
    // スピーカーアイコン（テキスト）
    ctx.textAlign='center';
    ctx.font=`${Math.floor(sbr*1.25)}px Arial`;
    ctx.fillStyle=soundEnabled?'rgba(200,255,200,0.92)':'rgba(255,150,150,0.92)';
    ctx.fillText(soundEnabled?'🔊':'🔇',sbcx,sbcy+Math.floor(sbr*0.42));
  }
}

function drawTopBar(){
  // ── Sky: base + sunny factor で晴れ空へブレンド ──
  const sf=weatherIdx===0?Math.max(0,(0.26-rainIntensity)/0.26):0; // 晴れ係数 0→1
  const skyBases=[['#2e4a6a','#121e38'],['#1a2c4a','#0a1228'],['#0e1a30','#060c1c'],['#060e1a','#020608']][weatherIdx];
  const g=ctx.createLinearGradient(0,0,0,BAR_H);
  g.addColorStop(0,skyBases[0]);g.addColorStop(1,skyBases[1]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,BAR_H);
  if(sf>0){
    const sg=ctx.createLinearGradient(0,0,0,BAR_H);
    sg.addColorStop(0,`rgba(132,198,248,${sf*0.94})`);
    sg.addColorStop(0.55,`rgba(88,162,238,${sf*0.88})`);
    sg.addColorStop(1,`rgba(65,138,218,${sf*0.82})`);
    ctx.fillStyle=sg;ctx.fillRect(0,0,W,BAR_H);
  }
  ctx.fillStyle=`rgba(0,0,0,${rainIntensity*0.44*(1-sf*0.85)})`;ctx.fillRect(0,0,W,BAR_H);

  ctx.save();ctx.beginPath();ctx.rect(0,0,W,BAR_H);ctx.clip();

  // ── 晴れ: 太陽・光芒・白い雲 ──
  if(sf>0.05){
    const sx=W*0.76,sy=BAR_H*0.22;
    // 太陽コロナグロー
    const glow=ctx.createRadialGradient(sx,sy,0,sx,sy,BAR_H*0.44);
    glow.addColorStop(0,`rgba(255,242,168,${sf*0.30})`);glow.addColorStop(1,'rgba(255,220,100,0)');
    ctx.fillStyle=glow;ctx.fillRect(0,0,W,BAR_H);
    // 太陽本体
    const sunR=Math.max(8,BAR_H*0.090);
    const sunG=ctx.createRadialGradient(sx-sunR*0.18,sy-sunR*0.18,sunR*0.04,sx,sy,sunR);
    sunG.addColorStop(0,`rgba(255,254,228,${sf})`);sunG.addColorStop(0.35,`rgba(255,232,95,${sf*0.96})`);
    sunG.addColorStop(0.78,`rgba(255,190,45,${sf*0.82})`);sunG.addColorStop(1,'rgba(255,160,0,0)');
    ctx.fillStyle=sunG;ctx.beginPath();ctx.arc(sx,sy,sunR,0,Math.PI*2);ctx.fill();
    // 光芒（12本、交互に長短）
    ctx.save();ctx.translate(sx,sy);ctx.rotate(t*0.11);
    for(let ri=0;ri<12;ri++){
      const ra=ri*Math.PI/6,long=ri%2===0;
      ctx.strokeStyle=`rgba(255,228,95,${sf*(long?0.40:0.22)})`;ctx.lineWidth=long?2.0:1.2;
      ctx.beginPath();ctx.moveTo(Math.cos(ra)*sunR*1.30,Math.sin(ra)*sunR*1.30);
      ctx.lineTo(Math.cos(ra)*sunR*(long?1.85:1.55),Math.sin(ra)*sunR*(long?1.85:1.55));ctx.stroke();
    }
    ctx.restore();
    // 白い綿雲
    [[0.13,0.40,BAR_H*0.092],[0.50,0.28,BAR_H*0.078],[0.33,0.56,BAR_H*0.062]].forEach(([xf,yf,cr],ci)=>{
      const cx=W*xf+Math.sin(t*(0.035+ci*0.011)+ci*1.7)*W*0.018;
      const cy=BAR_H*yf;
      ctx.globalAlpha=sf*0.52;
      for(let bi=0;bi<4;bi++){
        const bcx=cx+bi*cr*0.46,bcy=cy-Math.abs(bi-1.5)*cr*0.20;
        const cg2=ctx.createRadialGradient(bcx,bcy-cr*0.12,0,bcx,bcy,cr*(0.84-bi*0.055));
        cg2.addColorStop(0,'rgba(255,255,255,0.94)');cg2.addColorStop(0.5,'rgba(238,245,255,0.60)');cg2.addColorStop(1,'rgba(220,232,255,0)');
        ctx.fillStyle=cg2;ctx.beginPath();ctx.ellipse(bcx,bcy,cr*(0.84-bi*0.055),cr*0.44,0,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
    });
  }
  // ── 梅雨の晴れ間: sun glow + light rays when intensity is low ──
  if(rainIntensity<0.28&&weatherIdx<3){
    const brk=(0.28-rainIntensity)/0.28;
    const sg=ctx.createRadialGradient(W*0.70,BAR_H*0.26,0,W*0.70,BAR_H*0.26,BAR_H*0.78);
    sg.addColorStop(0,`rgba(215,188,118,${brk*0.44})`);
    sg.addColorStop(0.42,`rgba(188,158,96,${brk*0.18})`);
    sg.addColorStop(1,'rgba(150,122,72,0)');
    ctx.fillStyle=sg;ctx.fillRect(0,0,W,BAR_H);
    // Light rays through thin clouds
    if(brk>0.35){
      for(let ri=0;ri<4;ri++){
        const ang=-0.50+ri*0.17,ryA=brk*0.052*(0.5+Math.sin(t*0.52+ri)*0.5);
        const ryG=ctx.createLinearGradient(W*0.70,BAR_H*0.26,W*0.70+Math.cos(ang)*W,BAR_H*0.26+Math.sin(ang)*BAR_H);
        ryG.addColorStop(0,`rgba(222,198,138,${ryA})`);ryG.addColorStop(1,'rgba(200,175,115,0)');
        ctx.fillStyle=ryG;ctx.beginPath();
        ctx.moveTo(W*0.70,BAR_H*0.26);
        ctx.lineTo(W*0.70+Math.cos(ang-0.09)*W*1.6,BAR_H*0.26+Math.sin(ang-0.09)*W*1.6);
        ctx.lineTo(W*0.70+Math.cos(ang+0.09)*W*1.6,BAR_H*0.26+Math.sin(ang+0.09)*W*1.6);
        ctx.closePath();ctx.fill();
      }
    }
  }

  // ── Clouds: size and darkness grow with intensity ──
  const cloudA=0.07+rainIntensity*0.54;
  [[0.08,0.22,W*0.56,W*0.22],[0.55,0.30,W*0.50,W*0.18],[0.28,0.12,W*0.42,W*0.17]].forEach(([xf,yf,cw,ch],ci)=>{
    // Clouds move faster and descend slightly during heavy rain
    const speed=0.06+rainIntensity*0.06;
    const cxPos=(W*xf+Math.sin(t*(speed+ci*0.015)+ci*2.0)*W*0.055+W*(1+rainIntensity*0.03))%(W*1.2)-W*0.1;
    const cyPos=BAR_H*(yf*(1-rainIntensity*0.10));
    for(let bi=0;bi<3;bi++){
      const bx2=cxPos+bi*cw*0.24,by2=cyPos+Math.sin(bi*1.3)*ch*0.2;
      const brad=cw*(0.28+bi*0.04)*(0.60+rainIntensity*0.45); // clouds grow darker and larger
      const cg2=ctx.createRadialGradient(bx2,by2-brad*0.1,0,bx2,by2,brad);
      cg2.addColorStop(0,`rgba(28,46,92,${cloudA*(1.3-bi*0.18)})`);
      cg2.addColorStop(0.55,`rgba(16,28,68,${cloudA*0.55})`);
      cg2.addColorStop(1,'rgba(6,12,32,0)');
      ctx.fillStyle=cg2;ctx.beginPath();ctx.ellipse(bx2,by2,brad,brad*0.48,0,0,Math.PI*2);ctx.fill();
    }
  });

  // ── Wind streaks: appear when intensity is high ──
  if(rainIntensity>0.60&&weatherIdx>=1){
    const wA=(rainIntensity-0.60)/0.40*0.24;
    ctx.strokeStyle=`rgba(190,225,255,${wA})`;ctx.lineWidth=1.1;
    for(let wi=0;wi<8;wi++){
      const wy=((t*70*(0.8+wi*0.10)+wi*BAR_H*0.145)%BAR_H);
      const wx=((t*36*(1.0+wi*0.07)+wi*W*0.155)%(W*1.4))-W*0.2;
      const wlen=18+rainIntensity*30;
      ctx.beginPath();ctx.moveTo(wx,wy);ctx.lineTo(wx+wlen,wy+1.5);ctx.stroke();
    }
  }

  // ── Rain streaks: density, angle, length all respond to intensity ──
  const rAlpha=[0.48,0.68,0.84,0.98][weatherIdx]*(1-sf*0.96)*Math.min(1,rainIntensity*1.40);
  const rWind=[0.04,0.12,0.24,0.42][weatherIdx]*(0.40+rainIntensity*0.85);
  const rLen=[0.80,1.10,1.55,2.20][weatherIdx]*(0.45+rainIntensity*0.72);
  ctx.lineWidth=weatherIdx>=3?(1.2+rainIntensity*0.7):weatherIdx>=2?(0.9+rainIntensity*0.55):0.8;
  for(const d of rainDrops){
    const al=d.a*rAlpha;if(al<0.028)continue;
    ctx.strokeStyle=`rgba(180,225,255,${al})`;
    const len=d.l*rLen;
    ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x+len*rWind,d.y+len);ctx.stroke();
  }

  // ── Mist at bottom of sky ──
  if(rainIntensity>0.10){
    const mA=rainIntensity*[0.08,0.15,0.28,0.44][weatherIdx];
    const mg2=ctx.createLinearGradient(0,BAR_H*0.62,0,BAR_H);
    mg2.addColorStop(0,'rgba(90,135,210,0)');mg2.addColorStop(1,`rgba(75,118,195,${mA})`);
    ctx.fillStyle=mg2;ctx.fillRect(0,BAR_H*0.62,W,BAR_H*0.38);
  }

  ctx.restore();

  // Lightning flash (sky area)
  if(lightningFlash>0){ctx.fillStyle=`rgba(220,238,255,${lightningFlash*0.72})`;ctx.fillRect(0,0,W,BAR_H);}

  // ── Weather badge（晴れ間は非表示） ──
  const bx2=8,by2=Math.floor(BAR_H*0.07),bw2=Math.floor(W*0.30),bh2=Math.floor(BAR_H*0.34);
  const isSunnyBadge=(weatherIdx===0&&rainIntensity<0.26);
  if(!isSunnyBadge){
    const wC=['#284818','#183860','#481808','#380408'];
    const wB=['#60b840','#3898e0','#e04818','#e01010'];
    const flash2=(weatherIdx>=2||rainIntensity>0.80)&&Math.floor(t*3)%2===0;
    ctx.fillStyle=wC[weatherIdx];ctx.beginPath();ctx.roundRect(bx2,by2,bw2,bh2,6);ctx.fill();
    ctx.strokeStyle=flash2?wB[weatherIdx]:'rgba(255,255,255,0.18)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(bx2,by2,bw2,bh2,6);ctx.stroke();
    ctx.textAlign='center';ctx.fillStyle='#e0f0ff';ctx.font=`bold ${Math.floor(bh2*0.65)}px Arial`;
    ctx.fillText(W_LABEL[weatherIdx],bx2+bw2/2,by2+bh2*0.76);
  }

  // Intensity status label (梅雨の晴れ間 / 強まる / 激しい雨)
  const iLabel=rainIntensity<0.18?'☀ 晴れ間':rainIntensity<0.46?'':rainIntensity<0.72?'↑ 強まる':'⛈ 激しい';
  if(iLabel){
    ctx.textAlign='left';
    ctx.fillStyle=rainIntensity<0.18?'#ffd860':'rgba(185,208,235,0.90)';
    ctx.font=`${Math.floor(BAR_H*0.12)}px Arial`;
    ctx.fillText(iLabel,bx2+bw2+6,by2+bh2*0.74);
  }

  // Alert text
  const alertY=by2+bh2*0.78;
  if(weatherIdx===3){
    const fl=Math.floor(t*4)%2===0;
    ctx.textAlign='right';ctx.fillStyle=fl?'#ff3333':'#ff7722';
    ctx.font=`bold ${Math.floor(BAR_H*0.16)}px Arial`;
    ctx.fillText('⚡ 暴風雨警報',W-8,alertY);
  }else if(weatherIdx===2){
    ctx.textAlign='right';ctx.fillStyle='#ff8844';
    ctx.font=`bold ${Math.floor(BAR_H*0.15)}px Arial`;
    ctx.fillText('⚠ 大雨注意報',W-8,alertY);
  }

  // Score / time → draw() 最後に移動済み

  // Weather change warning
  if(weatherIdx<3&&weatherTimer<5&&Math.floor(t*4)%2===0){
    ctx.textAlign='center';ctx.fillStyle='#ffee44';
    ctx.font=`bold ${Math.floor(BAR_H*0.15)}px Arial`;
    ctx.fillText('⚠ 天気が悪化する！',W/2,BAR_H*0.90);
  }

  // Floor water gauge
  if(floorWater>0.25){
    const gx=8,gw=Math.floor(W*0.32),gy=BAR_H-Math.floor(BAR_H*0.24),gh=Math.floor(BAR_H*0.15);
    ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(gx,gy,gw,gh);
    ctx.fillStyle=floorWater>0.7?'rgba(255,50,50,0.85)':'rgba(255,150,30,0.75)';
    ctx.fillRect(gx,gy,gw*floorWater,gh);
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.strokeRect(gx,gy,gw,gh);
    ctx.fillStyle='#ffe0c0';ctx.textAlign='left';ctx.font=`${Math.floor(gh*0.72)}px Arial`;
    ctx.fillText(`床 ${Math.floor(floorWater*100)}%`,gx+4,gy+gh*0.82);
  }
  ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(0,BAR_H-2,W,2);
  // アジサイ（左右）
  ctx.save();ctx.beginPath();ctx.rect(0,0,W,BAR_H+2);ctx.clip();
  drawAjisai(true);drawAjisai(false);
  ctx.restore();
}

function _drawSingleFlower(cx,cy,r,col,ang){
  for(let pi=0;pi<4;pi++){
    const pa=ang+pi*Math.PI/2,px=cx+Math.cos(pa)*r*0.62,py=cy+Math.sin(pa)*r*0.62;
    ctx.fillStyle=col;ctx.strokeStyle='rgba(255,255,255,0.22)';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.ellipse(px,py,r*0.50,r*0.36,pa,0,Math.PI*2);ctx.fill();ctx.stroke();
  }
  ctx.fillStyle='rgba(255,250,200,0.92)';ctx.beginPath();ctx.arc(cx,cy,r*0.20,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,220,60,0.80)';ctx.beginPath();ctx.arc(cx-r*0.07,cy-r*0.07,r*0.11,0,Math.PI*2);ctx.fill();
}
function _drawLeaf(cx,cy,lw,lh,rot){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);
  const lg=ctx.createLinearGradient(-lw*0.3,-lh*0.2,lw*0.3,lh*0.3);
  lg.addColorStop(0,'#4a9238');lg.addColorStop(1,'#285820');
  ctx.fillStyle=lg;ctx.beginPath();ctx.ellipse(0,0,lw,lh,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(18,52,14,0.35)';ctx.lineWidth=0.8;
  for(let vi=-2;vi<=2;vi++){ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(lw*0.80*Math.cos(vi*0.22),lh*0.82*Math.sin(vi*0.22+Math.PI/2));ctx.stroke();}
  // 雨水がリーフを滑り落ちる
  if(rainIntensity>0.10){
    const dp=((t*0.48+cx*0.009)%1);
    const dA=Math.min(1,(rainIntensity-0.10)*4)*(0.55+Math.sin(dp*Math.PI)*0.35);
    ctx.fillStyle=`rgba(200,240,255,${dA*0.78})`;
    ctx.beginPath();ctx.ellipse(lw*0.28*(dp-0.05),lh*0.62*dp,2.4,3.5,0.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(255,255,255,${dA*0.55})`;
    ctx.beginPath();ctx.ellipse(lw*0.28*(dp-0.05)-0.6,lh*0.62*dp-0.9,0.9,0.55,0.3,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}
function _drawCluster(cx,cy,r,c1,c2,sw,sw2){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(sw*0.006);
  const bg=ctx.createRadialGradient(0,-r*0.08,0,0,r*0.1,r*1.1);
  bg.addColorStop(0,'rgba(0,0,55,0.10)');bg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(0,0,r,r*0.80,0,0,Math.PI*2);ctx.fill();
  // 花の配置（確定的）
  const fl=[{x:0,y:0,s:1.0,i:0}];
  for(let i=0;i<6;i++)fl.push({x:Math.cos(i*Math.PI/3)*r*0.38,y:Math.sin(i*Math.PI/3)*r*0.28,s:0.92,i:i+1});
  for(let i=0;i<10;i++)fl.push({x:Math.cos(i*Math.PI/5+0.28)*r*0.74,y:Math.sin(i*Math.PI/5+0.28)*r*0.52,s:0.82,i:i+7});
  for(const f of fl){
    const pr=r*0.295*f.s;
    const col=f.i%3===0?c1:f.i%3===1?c2:'#a0c8ff';
    _drawSingleFlower(f.x,f.y,pr,col,f.i*0.50+sw2*0.04);
    if(rainIntensity>0.16){
      const dA=Math.min(1,(rainIntensity-0.16)*3.5)*(0.40+Math.sin(t*1.8+f.i)*0.30);
      ctx.fillStyle=`rgba(218,242,255,${dA*0.70})`;ctx.beginPath();ctx.arc(f.x+pr*0.38,f.y-pr*0.28,pr*0.22,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=`rgba(255,255,255,${dA*0.48})`;ctx.beginPath();ctx.arc(f.x+pr*0.26,f.y-pr*0.38,pr*0.10,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.restore();
}
function drawAjisai(isLeft){
  const bx=isLeft?W*0.065:W*0.935;
  const by=BAR_H;
  const clR=Math.max(16,BAR_H*0.130);
  const stemH=BAR_H*0.60;
  const sw =Math.sin(t*0.65+(isLeft?0:2.1))*(3+rainIntensity*13); // 主揺れ
  const sw2=Math.sin(t*1.95+(isLeft?1.0:3.0))*(1+rainIntensity*4.5); // 速揺れ
  const c1=isLeft?'#7858e8':'#d068c0';
  const c2=isLeft?'#9878f8':'#e890d8';
  const topX=bx+sw*0.85,topY=by-stemH;
  const midX=bx+sw*0.50,midY=by-stemH*0.50;
  const brX=midX+(isLeft?-1:1)*clR*1.05+sw2*0.5,brY=midY-clR*0.45;
  // 茎
  ctx.save();
  ctx.strokeStyle='#254818';ctx.lineWidth=Math.max(2,BAR_H*0.010);ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(bx,by);ctx.quadraticCurveTo(midX,midY,topX,topY);ctx.stroke();
  ctx.lineWidth=Math.max(1.5,BAR_H*0.007);
  ctx.beginPath();ctx.moveTo(midX,midY);ctx.lineTo(brX,brY);ctx.stroke();
  ctx.restore();
  // 葉
  _drawLeaf(midX+(isLeft?-1:1)*clR*0.42,midY+clR*0.28,clR*1.30,clR*0.74,(isLeft?-0.65:0.65)+sw*0.018);
  _drawLeaf(topX+(isLeft?-1:1)*clR*0.55,topY+clR*0.85,clR*0.92,clR*0.54,(isLeft?0.40:-0.40)+sw2*0.022);
  // 花房
  _drawCluster(topX,topY,clR,c1,c2,sw,sw2);
  _drawCluster(brX,brY,clR*0.70,c1,c2,sw2,sw*0.5);
}

function drawCeiling(){
  // ── 赤い瓦タイル背景 ──
  const tileW=Math.floor(CELL*1.5),tileH=Math.floor(CELL*0.54);
  const tcols=Math.ceil(W/tileW)+2,trows=Math.ceil(CEIL_H/tileH)+2;
  ctx.fillStyle='#9a2215';ctx.fillRect(0,BAR_H,W,CEIL_H);
  for(let tr=0;tr<trows;tr++){
    const ty=BAR_H-Math.floor(tileH*0.4)+tr*tileH;
    const sg=(tr%2)*Math.floor(tileW*0.5);
    for(let tc=-1;tc<tcols;tc++){
      const tx=tc*tileW-sg;
      const tg=ctx.createLinearGradient(tx,ty,tx,ty+tileH);
      tg.addColorStop(0,'#ca3c26');tg.addColorStop(0.45,'#b02c1a');tg.addColorStop(1,'#7c1a0c');
      ctx.fillStyle=tg;ctx.fillRect(tx+1,ty+1,tileW-2,tileH-1);
      ctx.fillStyle='rgba(36,5,2,0.60)';ctx.fillRect(tx,ty,tileW,1.5);   // 横目地
      ctx.fillStyle='rgba(36,5,2,0.50)';ctx.fillRect(tx,ty,1.5,tileH);   // 縦目地
      ctx.fillStyle='rgba(255,110,70,0.16)';ctx.fillRect(tx+2,ty+2,tileW-4,2); // ハイライト
    }
  }

  // Water stains spreading from source columns
  ctx.save();ctx.beginPath();ctx.rect(0,BAR_H,W,CEIL_H+2);ctx.clip();
  for(const s of ceilStains){
    if(s.size<3)continue;
    const sx=GX+s.col*CELL+CELL/2,sy=GRID_TOP;
    const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,s.size);
    sg.addColorStop(0,`rgba(28,16,4,${s.alpha})`);
    sg.addColorStop(0.45,`rgba(42,25,8,${s.alpha*0.52})`);
    sg.addColorStop(1,'rgba(20,12,3,0)');
    ctx.fillStyle=sg;
    ctx.beginPath();ctx.ellipse(sx,sy,s.size*1.35,s.size*0.42,0,0,Math.PI*2);ctx.fill();
    // Wet shimmer (water pooling)
    if(s.alpha>0.14){
      const wg2=ctx.createRadialGradient(sx,sy-3,0,sx,sy,s.size*0.38);
      wg2.addColorStop(0,`rgba(65,85,125,${s.alpha*0.36})`);
      wg2.addColorStop(1,'rgba(45,65,105,0)');
      ctx.fillStyle=wg2;
      ctx.beginPath();ctx.ellipse(sx,sy-2,s.size*0.38,s.size*0.12,0,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.restore();

  for(const sc of SOURCE_COLS){
    const sx=GX+sc*CELL+CELL/2;
    const sg=ctx.createRadialGradient(sx,BAR_H+7,1,sx,BAR_H+7,CELL*1.1);
    sg.addColorStop(0,'rgba(45,65,110,0.45)');sg.addColorStop(1,'rgba(45,65,110,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.ellipse(sx,BAR_H+7,CELL*1.1,CELL*0.45,0,0,Math.PI*2);ctx.fill();
    const wsg=ctx.createLinearGradient(sx,BAR_H,sx,GRID_TOP);
    wsg.addColorStop(0,'rgba(60,100,180,0.35)');wsg.addColorStop(1,'rgba(60,100,180,0.04)');
    ctx.fillStyle=wsg;ctx.fillRect(sx-CELL*0.12,BAR_H,CELL*0.24,GRID_TOP-BAR_H);
  }
  for(const cr of crackPaths){
    ctx.strokeStyle=cr.branch?'rgba(60,38,16,0.38)':'rgba(55,33,14,0.65)';
    ctx.lineWidth=cr.branch?0.8:1.2;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(cr.cx+cr.pts[0].x,cr.cy+cr.pts[0].y);
    for(let i=1;i<cr.pts.length;i++)ctx.lineTo(cr.cx+cr.pts[i].x,cr.cy+cr.pts[i].y);ctx.stroke();
  }
  ctx.fillStyle='rgba(0,0,0,0.08)';ctx.fillRect(GX-2,GRID_TOP-2,COLS*CELL+4,ROWS*CELL+4);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)drawPipeCell(r,c);
  // パイプ出口の垂れ下がり大型水滴（天井エリアのみ）
  const curExits=getExits();
  for(const ec of curExits){
    const dx=GX+ec*CELL+CELL/2,dy=GRID_TOP+ROWS*CELL;
    const hang=3+Math.sin(t*4.2+ec*0.8)*2;
    const rr=3.5+Math.sin(t*3.8+ec*1.2)*1.0;
    const wg=ctx.createRadialGradient(dx-rr*0.3,dy+hang-rr*0.3,rr*0.1,dx,dy+hang,rr*1.5);
    wg.addColorStop(0,'rgba(255,255,255,0.95)');wg.addColorStop(0.3,'rgba(160,225,255,0.88)');
    wg.addColorStop(0.7,'rgba(65,148,248,0.75)');wg.addColorStop(1,'rgba(30,90,210,0)');
    ctx.fillStyle=wg;ctx.beginPath();ctx.ellipse(dx,dy+hang,rr*0.75,rr,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.70)';
    ctx.beginPath();ctx.ellipse(dx-rr*0.25,dy+hang-rr*0.3,rr*0.28,rr*0.18,Math.PI*0.6,0,Math.PI*2);ctx.fill();
  }
  if(snail&&scene==='play')drawSnailSprite();
  ctx.fillStyle='rgba(0,0,0,0.30)';ctx.fillRect(0,BAR_H+CEIL_H-5,W,5);
}

function drawPipeCell(r,c){
  const x=GX+c*CELL,y=GRID_TOP+r*CELL,cx2=x+CELL/2,cy2=y+CELL/2;
  const half=CELL/2-1,pw=Math.max(3,Math.floor(CELL*0.34));
  const offs=[[0,-1],[1,0],[0,1],[-1,0]];
  ctx.fillStyle=(r+c)%2===0?'rgba(80,18,8,0.28)':'rgba(60,12,5,0.28)';
  ctx.fillRect(x+1,y+1,CELL-2,CELL-2);
  let dispRot=gCell(r,c).rot,rotOffset=0;
  if(rotAnim&&rotAnim.r===r&&rotAnim.c===c){
    const ease=rotAnim.t<0.5?2*rotAnim.t*rotAnim.t:1-Math.pow(-2*rotAnim.t+2,2)/2;
    rotOffset=(rotAnim.toRot-rotAnim.fromRot)*ease*Math.PI/2;dispRot=rotAnim.fromRot;
  }
  const conn=PCONN[gCell(r,c).type][dispRot];
  const hasW=gCell(r,c).hasWater,isSrc=gCell(r,c).locked;
  const rim=hasW?'#b0e0ff':isSrc?'#ffe8a0':'#cc9c48';
  const hi =hasW?'#58b8e8':isSrc?'#c89030':'#9c6828';
  const base=hasW?'#1870c0':isSrc?'#806018':'#624018';
  const lo =hasW?'#082858':isSrc?'#402808':'#2e1c08';
  ctx.save();
  if(rotOffset!==0){ctx.translate(cx2,cy2);ctx.rotate(rotOffset);ctx.translate(-cx2,-cy2);}
  function arm(ax,ay,aw,ah,isH){
    const g=isH?ctx.createLinearGradient(ax,ay,ax,ay+ah):ctx.createLinearGradient(ax,ay,ax+aw,ay);
    g.addColorStop(0,rim);g.addColorStop(0.13,hi);g.addColorStop(0.55,base);g.addColorStop(1,lo);
    ctx.fillStyle=g;ctx.fillRect(ax,ay,aw,ah);
  }
  for(let d=0;d<4;d++){
    if(!conn[d])continue;
    if(d===1||d===3)arm(d===3?x:cx2,cy2-pw/2,half,pw,true);
    else arm(cx2-pw/2,d===0?y:cy2,pw,half,false);
  }
  const hg=ctx.createRadialGradient(cx2-pw*0.2,cy2-pw*0.2,1,cx2,cy2,pw*0.7);
  hg.addColorStop(0,rim);hg.addColorStop(0.25,hi);hg.addColorStop(0.65,base);hg.addColorStop(1,lo);
  ctx.fillStyle=hg;ctx.beginPath();ctx.arc(cx2,cy2,pw*0.52,0,Math.PI*2);ctx.fill();
  for(let d=0;d<4;d++){
    if(!conn[d])continue;
    const ex=cx2+offs[d][0]*half,ey=cy2+offs[d][1]*half;
    const cg=ctx.createRadialGradient(ex-pw*0.14,ey-pw*0.14,1,ex,ey,pw*0.48);
    cg.addColorStop(0,hi);cg.addColorStop(0.5,base);cg.addColorStop(1,lo);
    ctx.fillStyle=cg;ctx.beginPath();ctx.arc(ex,ey,pw*0.48,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  if(hasW&&rotOffset===0){
    ctx.fillStyle='rgba(180,238,255,0.72)';
    for(let d=0;d<4;d++){
      if(!conn[d])continue;
      const phase=((t*2.2+(r*COLS+c)*0.17)%1);
      const bx=cx2+offs[d][0]*half*phase,by=cy2+offs[d][1]*half*phase;
      const br=Math.max(1,pw*0.17)*(0.5+0.5*Math.sin(phase*Math.PI));
      ctx.globalAlpha=0.55*(1-phase*0.45);ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  if(isSrc){
    ctx.fillStyle='rgba(100,200,255,0.75)';ctx.beginPath();ctx.arc(cx2,y+2,2.2,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(60,160,225,0.45)';ctx.lineWidth=0.8;ctx.strokeRect(x+1,y+1,CELL-2,CELL-2);
  }
}

function drawRoomDecor(){
  // Vertical wood panel seams
  for(let i=1;i<8;i++){
    const px=Math.floor(W*i/8);
    ctx.fillStyle='rgba(0,0,0,0.13)';ctx.fillRect(px,ROOM_TOP,1,ROOM_H);
    ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(px+1,ROOM_TOP,1,ROOM_H);
  }
  for(let i=0;i<8;i++){
    if(i%2===0){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(Math.floor(W*i/8),ROOM_TOP,Math.floor(W/8),ROOM_H);}
  }
  // Window (left side) showing rainy exterior
  const ww=Math.floor(W*0.145),wh2=Math.floor(ROOM_H*0.50);
  const wx=Math.floor(W*0.048),wy=ROOM_TOP+Math.floor(ROOM_H*0.11);
  ctx.fillStyle='#120c06';ctx.fillRect(wx-4,wy-4,ww+8,wh2+8);
  const extG=ctx.createLinearGradient(wx,wy,wx,wy+wh2);
  extG.addColorStop(0,W_SKY[weatherIdx]);extG.addColorStop(1,'#020608');
  ctx.fillStyle=extG;ctx.fillRect(wx,wy,ww,wh2);
  // Rain on glass
  ctx.save();ctx.beginPath();ctx.rect(wx,wy,ww,wh2);ctx.clip();
  const wrA=[0.10,0.20,0.36,0.54][weatherIdx];
  ctx.strokeStyle=`rgba(140,200,255,${wrA})`;ctx.lineWidth=0.8;
  for(let ri=0;ri<11;ri++){
    const rx=wx+((ri*ww*0.105+t*16*(0.7+ri*0.08))%ww+ww)%ww;
    const ry=wy+((t*62*(0.8+ri*0.055)+ri*wh2*0.088)%(wh2+8)+wh2+8)%wh2;
    ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx+1.5,ry+8);ctx.stroke();
  }
  // Glass reflection
  ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(wx+2,wy+2,ww*0.38,wh2*0.42);
  ctx.restore();
  // Window frame crossbars
  ctx.fillStyle='#120c06';
  ctx.fillRect(wx-2,wy+Math.floor(wh2/2)-2,ww+4,4);
  ctx.fillRect(wx+Math.floor(ww/2)-2,wy-2,4,wh2+4);
  ctx.strokeStyle='rgba(90,60,28,0.5)';ctx.lineWidth=1;ctx.strokeRect(wx,wy,ww,wh2);
}

function drawRoom(){
  const fg=ctx.createLinearGradient(0,ROOM_TOP,0,ROOM_TOP+ROOM_H);
  fg.addColorStop(0,'#7a6840');fg.addColorStop(0.55,'#524230');fg.addColorStop(1,'#342018');
  ctx.fillStyle=fg;ctx.fillRect(0,ROOM_TOP,W,ROOM_H);
  drawRoomDecor();
  ctx.strokeStyle='rgba(0,0,0,0.10)';ctx.lineWidth=1;
  for(let i=0;i<4;i++){const ly=ROOM_TOP+i*(ROOM_H/4);ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W,ly);ctx.stroke();}
  // ── 雫: 水柱ライン + 本体（部屋背景の上に描画）──
  {
    const cExits=getExits();
    for(const ec of cExits){
      const dx=GX+ec*CELL+CELL/2,dy=GRID_TOP+ROWS*CELL;
      for(const d of drips){
        if(Math.abs(d.x-dx)<CELL*0.6&&d.y>ROOM_TOP){
          const lg=ctx.createLinearGradient(dx,ROOM_TOP,dx,d.y);
          lg.addColorStop(0,'rgba(100,190,255,0.08)');lg.addColorStop(1,'rgba(80,160,240,0.22)');
          ctx.fillStyle=lg;ctx.fillRect(dx-3,ROOM_TOP,6,d.y-ROOM_TOP);
        }
      }
    }
    for(const d of drips){
      ctx.save();
      const tailLen=d.r*4.5+(d.vy||100)*0.012;
      ctx.strokeStyle='rgba(140,215,255,0.52)';ctx.lineWidth=d.r*0.88;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(d.x,d.y-tailLen);ctx.lineTo(d.x,d.y-d.r*0.9);ctx.stroke();
      const dg=ctx.createRadialGradient(d.x-d.r*0.28,d.y-d.r*0.28,d.r*0.1,d.x,d.y+d.r*0.2,d.r*1.35);
      dg.addColorStop(0,'rgba(255,255,255,0.99)');dg.addColorStop(0.22,'rgba(188,240,255,0.95)');
      dg.addColorStop(0.60,'rgba(68,152,252,0.90)');dg.addColorStop(1,'rgba(25,85,210,0)');
      ctx.fillStyle=dg;ctx.beginPath();ctx.ellipse(d.x,d.y,d.r*0.72,d.r*1.18,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.85)';
      ctx.beginPath();ctx.ellipse(d.x-d.r*0.22,d.y-d.r*0.30,d.r*0.28,d.r*0.16,Math.PI*0.65,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }
  if(floorWater>0.02){
    const wh=Math.floor(ROOM_H*floorWater*0.68),wy=ROOM_TOP+ROOM_H-wh;
    const wg=ctx.createLinearGradient(0,wy,0,ROOM_TOP+ROOM_H);
    wg.addColorStop(0,'rgba(38,95,175,0.30)');wg.addColorStop(1,'rgba(18,52,138,0.60)');
    ctx.fillStyle=wg;ctx.fillRect(0,wy,W,wh);
    ctx.strokeStyle=`rgba(100,180,255,${0.28+floorWater*0.42})`;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,wy);for(let wx=0;wx<W;wx+=3)ctx.lineTo(wx,wy+Math.sin(wx*0.055+t*2.8)*3);ctx.stroke();
    if(floorWater>0.65){
      const da=0.55+Math.sin(t*6)*0.45;
      ctx.fillStyle=`rgba(255,35,35,${da*0.65})`;
      ctx.fillRect(0,ROOM_TOP,4,ROOM_H*(floorWater-0.65)/0.35*0.7);
      ctx.fillRect(W-4,ROOM_TOP,4,ROOM_H*(floorWater-0.65)/0.35*0.7);
    }
  }
  for(const p of puddles){
    const age=p.t/8,a=0.40*(1-age*age);
    ctx.fillStyle=`rgba(60,120,190,${a})`;
    ctx.beginPath();ctx.ellipse(p.x,BUCKET_FLOOR_Y+8,p.r*(1+age*0.5),p.r*0.30,0,0,Math.PI*2);ctx.fill();
  }
  for(const rp of ripples){
    ctx.strokeStyle=`rgba(120,190,255,${rp.alpha})`;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.ellipse(rp.x,rp.y,rp.r,rp.r*0.30,0,0,Math.PI*2);ctx.stroke();
  }
  for(let i=0;i<spawnedItems.length;i++)drawSpawnedItem(spawnedItems[i],dragging&&draggingItemIdx===i);
  // Splash particles
  for(const p of splashParticles){
    const col=p.isBucket?`rgba(88,175,255,${p.alpha})`:`rgba(60,130,210,${p.alpha})`;
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  // 蒸発パーティクル（晴れ間）
  for(const p of evapParticles){
    ctx.fillStyle=`rgba(215,232,252,${p.alpha})`;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  // 晴れ間ラベル
  if(rainIntensity<0.20&&floorWater>0.02){
    const bf=(0.20-rainIntensity)/0.20;
    ctx.textAlign='center';ctx.fillStyle=`rgba(255,225,100,${bf*0.90})`;
    ctx.font=`${Math.floor(ROOM_H*0.10)}px Arial`;
    ctx.fillText('☀ 乾燥中',W/2,ROOM_TOP+ROOM_H*0.14);
  }
  // 雑巾ハンドル（床水があるとき常時表示）
  if(floorWater>0.02){
    const hx=mopHandleX,hy=ROOM_TOP+ROOM_H*0.91;
    const hw=CELL*3.6,hh=Math.max(8,CELL*0.44);
    if(mopDrag){
      // ドラッグ中: 水しぶきの跡 + 動く雑巾
      ctx.fillStyle='rgba(60,130,220,0.13)';
      ctx.fillRect(0,hy-hh*0.5,W,hh*2.4);
      const mg=ctx.createLinearGradient(hx-hw/2,hy,hx+hw/2,hy);
      mg.addColorStop(0,'rgba(195,185,160,0.88)');
      mg.addColorStop(0.5,'rgba(252,246,228,0.98)');
      mg.addColorStop(1,'rgba(195,185,160,0.88)');
      ctx.fillStyle=mg;
      ctx.beginPath();ctx.roundRect(hx-hw/2,hy-hh/2,hw,hh,hh/2);ctx.fill();
      ctx.strokeStyle='rgba(150,132,92,0.70)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(hx-hw/2,hy-hh/2,hw,hh,hh/2);ctx.stroke();
      // スプラッシュ
      ctx.fillStyle='rgba(80,155,248,0.40)';
      for(let i=0;i<5;i++){
        const sx=hx+Math.sin(t*9+i*1.3)*hw*0.40;
        const sy=hy+hh/2+Math.abs(Math.cos(t*7+i*2.1))*CELL*0.30;
        ctx.beginPath();ctx.arc(sx,sy,1.2+Math.sin(t*5+i)*0.8,0,Math.PI*2);ctx.fill();
      }
      // 削減量
      if(mopDrag.reduced>0.005){
        ctx.textAlign='center';ctx.fillStyle='rgba(140,220,255,0.92)';
        ctx.font=`bold ${Math.floor(ROOM_H*0.10)}px Arial`;
        ctx.fillText(`-${Math.round(mopDrag.reduced*100)}%`,hx,hy-hh/2-6);
      }
    }else{
      // 待機中: 雑巾アイコン + ← → 矢印
      const pulse=0.72+Math.sin(t*3.5)*0.28;
      // グロー
      if(floorWater>0.08){
        ctx.save();ctx.globalAlpha=0.18*pulse;
        ctx.shadowColor='#6ac8ff';ctx.shadowBlur=18;
        ctx.fillStyle='#6ac8ff';
        ctx.beginPath();ctx.roundRect(hx-hw/2-8,hy-hh/2-8,hw+16,hh+16,hh/2+8);ctx.fill();
        ctx.restore();
      }
      // 雑巾本体
      const mg2=ctx.createLinearGradient(hx-hw/2,hy,hx+hw/2,hy);
      mg2.addColorStop(0,'rgba(190,178,148,0.78)');
      mg2.addColorStop(0.5,'rgba(245,238,210,0.92)');
      mg2.addColorStop(1,'rgba(190,178,148,0.78)');
      ctx.fillStyle=mg2;
      ctx.beginPath();ctx.roundRect(hx-hw/2,hy-hh/2,hw,hh,hh/2);ctx.fill();
      ctx.strokeStyle=`rgba(140,120,80,${0.55+pulse*0.25})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(hx-hw/2,hy-hh/2,hw,hh,hh/2);ctx.stroke();
      // 中央の縫い目ライン
      ctx.strokeStyle='rgba(160,140,100,0.40)';ctx.lineWidth=1;
      for(let i=1;i<4;i++){
        const lx=hx-hw/2+hw*i/4;
        ctx.beginPath();ctx.moveTo(lx,hy-hh/2+2);ctx.lineTo(lx,hy+hh/2-2);ctx.stroke();
      }
      // ← → 矢印
      const aw=Math.floor(CELL*0.9),fs=Math.floor(ROOM_H*0.11);
      ctx.textAlign='center';ctx.fillStyle=`rgba(200,235,255,${0.65+pulse*0.25})`;
      ctx.font=`bold ${fs}px Arial`;
      ctx.fillText('◀',hx-hw/2-aw*0.8,hy+fs*0.35);
      ctx.fillText('▶',hx+hw/2+aw*0.8,hy+fs*0.35);
      // ラベル
      ctx.fillStyle=`rgba(200,235,255,${0.50+pulse*0.20})`;
      ctx.font=`${Math.floor(ROOM_H*0.075)}px Arial`;
      ctx.fillText('雑巾がけ',hx,hy-hh/2-5);
    }
  }
  drawBucket(dragging&&draggingItemIdx===-1);drawDumpBtn();
  if(floorWater>0.65&&Math.floor(t*3)%2===0){
    ctx.textAlign='center';ctx.fillStyle='rgba(255,60,60,0.9)';
    ctx.font=`bold ${Math.floor(ROOM_H*0.14)}px Arial`;
    ctx.fillText('床が水浸し！',W/2,ROOM_TOP+ROOM_H*0.22);
  }
}

function drawSpawnedItem(si,isSelected){
  const iw=getItemW(si.type),ih=getItemH(si.type),ix=si.x,iy=si.y;
  const fill=si.water/si.max,isTub=si.type==='tub';
  // wide mouth at top (iy-ih), narrow base at bottom (iy)
  const btw=iw*(isTub?0.72:0.68);
  const rimRy=Math.max(3,iw*(isTub?0.062:0.090));
  const botRy=Math.max(2,btw*(isTub?0.055:0.078));
  const C=isTub
    ?['#4a3806','#886a0c','#e8ca3c','#886a0c','#3a2a04']
    :['#1c3010','#355820','#80ba46','#3a5e16','#152008'];
  ctx.save();
  if(isSelected)ctx.translate(0,-7);

  // drop shadow (larger/lower when lifted)
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath();ctx.ellipse(ix,iy+(isSelected?10:3),iw*(isSelected?0.44:0.36),iw*(isSelected?0.072:0.055),0,0,Math.PI*2);ctx.fill();

  // ── body (wide top, narrow bottom) ──
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ix-iw/2,iy-ih+rimRy);ctx.lineTo(ix+iw/2,iy-ih+rimRy);
  ctx.lineTo(ix+btw/2,iy);ctx.lineTo(ix-btw/2,iy);ctx.closePath();ctx.clip();

  const bg=ctx.createLinearGradient(ix-iw/2,0,ix+iw/2,0);
  bg.addColorStop(0,C[0]);bg.addColorStop(0.10,C[1]);bg.addColorStop(0.30,C[2]);
  bg.addColorStop(0.58,C[3]);bg.addColorStop(1,C[0]);
  ctx.fillStyle=bg;ctx.fillRect(ix-iw/2,iy-ih,iw,ih+2);

  // seam bands
  const bands=isTub?2:3;
  for(let i=1;i<=bands;i++){
    const fy=(iy-ih)+ih*(i/(bands+1)),hw=iw/2-(iw-btw)/2*(i/(bands+1));
    ctx.strokeStyle='rgba(0,0,0,0.13)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(ix-hw,fy);ctx.lineTo(ix+hw,fy);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(ix-hw,fy+1.2);ctx.lineTo(ix+hw,fy+1.2);ctx.stroke();
  }

  // water (fills from narrow bottom upward)
  if(fill>0.02){
    const wh=ih*fill*0.83,wy=(iy-ih)+(ih-wh),ratio=wh/ih;
    const wHW=btw/2+(iw-btw)/2*ratio;
    ctx.fillStyle=fill>0.82?'rgba(210,42,42,0.82)':'rgba(25,98,208,0.82)';
    ctx.beginPath();ctx.moveTo(ix-btw/2,iy);ctx.lineTo(ix+btw/2,iy);
    ctx.lineTo(ix+wHW,wy);ctx.lineTo(ix-wHW,wy);ctx.closePath();ctx.fill();
    const sRy=Math.max(1.5,wHW*(isTub?0.15:0.22));
    const sg=ctx.createRadialGradient(ix-wHW*0.2,wy,0,ix,wy,wHW);
    sg.addColorStop(0,fill>0.82?'rgba(255,150,150,0.65)':'rgba(120,205,255,0.65)');
    sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.ellipse(ix,wy,wHW,sRy,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=fill>0.82?'rgba(255,195,195,0.40)':'rgba(172,232,255,0.40)';ctx.lineWidth=0.9;
    ctx.beginPath();ctx.ellipse(ix,wy,wHW*0.46,sRy*0.46,0,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=fill>0.82?'#ffaaaa':'#c8eeff';ctx.textAlign='center';
    ctx.font=`bold ${Math.floor(ih*0.26)}px Arial`;
    ctx.fillText(`${Math.floor(fill*100)}%`,ix,wy+wh*0.44+ih*0.12);
  }

  // specular highlight streak (upper-left)
  ctx.save();ctx.globalAlpha=0.24;ctx.fillStyle='#ffffff';
  ctx.beginPath();
  ctx.moveTo(ix-iw*0.26,iy-ih*0.92+rimRy);ctx.lineTo(ix-iw*0.17,iy-ih*0.92+rimRy);
  ctx.lineTo(ix-btw*0.17,iy-ih*0.30);ctx.lineTo(ix-btw*0.25,iy-ih*0.30);
  ctx.closePath();ctx.fill();ctx.restore();

  ctx.restore(); // end body clip

  // narrow base ellipse
  ctx.fillStyle=isTub?'rgba(25,18,3,0.36)':'rgba(8,16,4,0.36)';
  ctx.beginPath();ctx.ellipse(ix,iy,btw/2,botRy,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=isTub?'rgba(30,22,4,0.55)':'rgba(10,20,5,0.55)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(ix,iy,btw/2,botRy,0,0,Math.PI*2);ctx.stroke();

  // wide rim ellipse (top opening)
  ctx.fillStyle=isTub?'rgba(12,8,2,0.74)':'rgba(4,10,2,0.74)';
  ctx.beginPath();ctx.ellipse(ix,iy-ih+rimRy,iw/2,rimRy,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=C[0];ctx.lineWidth=Math.max(2.5,iw*0.045);
  ctx.beginPath();ctx.ellipse(ix,iy-ih+rimRy,iw/2,rimRy,0,0,Math.PI*2);ctx.stroke();
  const rg=ctx.createLinearGradient(ix-iw/2,0,ix+iw/2,0);
  rg.addColorStop(0,C[0]);rg.addColorStop(0.42,C[2]);rg.addColorStop(1,C[0]);
  ctx.strokeStyle=rg;ctx.lineWidth=Math.max(1.8,iw*0.028);
  ctx.beginPath();ctx.ellipse(ix,iy-ih+rimRy,iw/2,rimRy,0,Math.PI,0);ctx.stroke();

  // handle
  if(isTub){
    // side lugs
    ctx.strokeStyle='#8a6a0a';ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(ix-iw/2-5,iy-ih*0.40,7,Math.PI*0.5,Math.PI*1.5);ctx.stroke();
    ctx.beginPath();ctx.arc(ix+iw/2+5,iy-ih*0.40,7,-Math.PI*0.5,Math.PI*0.5);ctx.stroke();
    ctx.fillStyle='#a07e10';
    [ix-iw/2,ix+iw/2].forEach(hx=>{ctx.beginPath();ctx.arc(hx,iy-ih*0.40,3,0,Math.PI*2);ctx.fill();});
  }else{
    ctx.strokeStyle='#b0b090';ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(ix,iy-ih+rimRy-3,iw*0.26,Math.PI,0);ctx.stroke();
    ctx.fillStyle='#c8c8a8';
    [ix-iw/2,ix+iw/2].forEach(hx=>{
      ctx.beginPath();ctx.arc(hx,iy-ih+rimRy,3.5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.30)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(hx,iy-ih+rimRy,3.5,0,Math.PI*2);ctx.stroke();
    });
  }

  // timer bar (just below rim)
  const tRatio=si.timeLeft/si.dur;
  const tbY=iy-ih+rimRy*2+3;
  ctx.fillStyle='rgba(0,0,0,0.32)';ctx.fillRect(ix-iw/2+2,tbY,iw-4,4);
  ctx.fillStyle=tRatio>0.35?'rgba(65,218,65,0.85)':'rgba(255,65,65,0.9)';
  ctx.fillRect(ix-iw/2+2,tbY,(iw-4)*tRatio,4);

  // label
  ctx.fillStyle='rgba(255,255,255,0.50)';ctx.textAlign='center';
  ctx.font=`${Math.floor(ih*0.20)}px Arial`;ctx.fillText(si.label,ix,iy-ih*0.55+rimRy);

  // ── 選択中: 黄色ハロー + アイテム名バッジ ──
  if(isSelected){
    ctx.save();
    ctx.shadowColor='rgba(255,225,50,0.95)';ctx.shadowBlur=18;
    ctx.strokeStyle='rgba(255,225,50,0.88)';ctx.lineWidth=2.8;
    ctx.beginPath();ctx.ellipse(ix,iy-ih+rimRy,iw/2+5,rimRy+2.5,0,0,Math.PI*2);ctx.stroke();
    ctx.restore();
    const fsz=Math.max(11,Math.floor(CELL*0.62));
    // badge background
    ctx.fillStyle='rgba(0,0,0,0.58)';
    ctx.beginPath();ctx.roundRect(ix-fsz*1.6,iy-ih-fsz-16,fsz*3.2,fsz+8,4);ctx.fill();
    ctx.textAlign='center';
    ctx.fillStyle='#ffe840';ctx.font=`bold ${fsz}px Arial`;
    ctx.fillText(si.label,ix,iy-ih-14);
  }

  ctx.restore();
}

function drawBucket(isSelected){
  const bw=getBW(),bh=getBH(),bx=bucket.x,by=BUCKET_FLOOR_Y-bh;
  // wide mouth at top (by), narrow base at bottom (by+bh)
  const btw=bw*0.68,rimRy=Math.max(4,bw*0.095),botRy=Math.max(2,btw*0.075);
  const fill=bucket.water/bucket.max;
  ctx.save();
  let sx=0;
  if(bucket.shakeT>0)sx=Math.sin(bucket.shakeT*40)*3*(bucket.shakeT/0.15);
  if(bucket.dumping){
    const ang=(bucket.dumpT/0.65)*Math.PI*0.55;
    ctx.translate(bx+bw/2+sx,by+rimRy);ctx.rotate(ang);ctx.translate(-(bx+bw/2),-by-rimRy);
    ctx.fillStyle=`rgba(80,160,240,${0.65*(1-bucket.dumpT/0.65)})`;
    for(let i=0;i<5;i++){const sp=bucket.dumpT/0.65;ctx.beginPath();ctx.ellipse(bx-bw*0.35+i*bw*0.2+Math.sin(i*1.3)*bw*0.12,by-sp*bh*0.45-i*8*sp,4,3,0,0,Math.PI*2);ctx.fill();}
  }else ctx.translate(sx,isSelected?-7:0);

  // drop shadow (larger/lower when lifted)
  ctx.fillStyle='rgba(0,0,0,0.20)';
  ctx.beginPath();ctx.ellipse(bx,BUCKET_FLOOR_Y+(isSelected?11:4),bw*(isSelected?0.48:0.38),bw*(isSelected?0.085:0.065),0,0,Math.PI*2);ctx.fill();

  // ── body (wide top, narrow bottom) ──
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(bx-bw/2,by+rimRy);ctx.lineTo(bx+bw/2,by+rimRy);
  ctx.lineTo(bx+btw/2,by+bh);ctx.lineTo(bx-btw/2,by+bh);ctx.closePath();ctx.clip();

  const bg=ctx.createLinearGradient(bx-bw/2,0,bx+bw/2,0);
  bg.addColorStop(0,'#1c3010');bg.addColorStop(0.10,'#355820');
  bg.addColorStop(0.28,'#80ba46');bg.addColorStop(0.52,'#62a030');
  bg.addColorStop(0.76,'#3a5e16');bg.addColorStop(1,'#152008');
  ctx.fillStyle=bg;ctx.fillRect(bx-bw/2,by,bw,bh+2);

  // seam bands
  for(let i=1;i<4;i++){
    const fy=by+bh*(i/4),hw=bw/2-(bw-btw)/2*(i/4);
    ctx.strokeStyle='rgba(0,0,0,0.13)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(bx-hw,fy);ctx.lineTo(bx+hw,fy);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(bx-hw,fy+1.2);ctx.lineTo(bx+hw,fy+1.2);ctx.stroke();
  }

  // water (fills from narrow bottom upward)
  if(fill>0.02&&!bucket.dumping){
    const wh=bh*fill*0.83,wy=by+bh-wh,ratio=wh/bh;
    const wHW=btw/2+(bw-btw)/2*ratio;
    ctx.fillStyle=fill>0.82?'rgba(210,42,42,0.82)':'rgba(25,98,208,0.82)';
    ctx.beginPath();ctx.moveTo(bx-btw/2,by+bh);ctx.lineTo(bx+btw/2,by+bh);
    ctx.lineTo(bx+wHW,wy);ctx.lineTo(bx-wHW,wy);ctx.closePath();ctx.fill();
    const sRy=Math.max(2,wHW*0.22);
    const sg=ctx.createRadialGradient(bx-wHW*0.2,wy,0,bx,wy,wHW);
    sg.addColorStop(0,fill>0.82?'rgba(255,155,155,0.65)':'rgba(128,210,255,0.65)');
    sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.ellipse(bx,wy,wHW,sRy,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=fill>0.82?'rgba(255,195,195,0.42)':'rgba(175,235,255,0.42)';ctx.lineWidth=1;
    ctx.beginPath();ctx.ellipse(bx,wy,wHW*0.50,sRy*0.50,0,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=fill>0.82?'#ffaaaa':'#c8eeff';ctx.textAlign='center';
    ctx.font=`bold ${Math.floor(bh*0.22)}px Arial`;
    ctx.fillText(`${Math.floor(fill*100)}%`,bx,wy+wh*0.46+bh*0.10);
  }

  // specular highlight streak (upper-left)
  ctx.save();ctx.globalAlpha=0.26;ctx.fillStyle='#ffffff';
  ctx.beginPath();
  ctx.moveTo(bx-bw*0.25,by+bh*0.08);ctx.lineTo(bx-bw*0.16,by+bh*0.08);
  ctx.lineTo(bx-btw*0.17,by+bh*0.65);ctx.lineTo(bx-btw*0.25,by+bh*0.65);
  ctx.closePath();ctx.fill();ctx.restore();

  ctx.restore(); // end body clip

  // narrow base ellipse
  ctx.fillStyle='rgba(8,16,4,0.40)';
  ctx.beginPath();ctx.ellipse(bx,by+bh,btw/2,botRy,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(12,24,6,0.60)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(bx,by+bh,btw/2,botRy,0,0,Math.PI*2);ctx.stroke();

  // wide rim ellipse (top opening)
  ctx.fillStyle='rgba(4,10,2,0.76)';
  ctx.beginPath();ctx.ellipse(bx,by+rimRy,bw/2,rimRy,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#1e3010';ctx.lineWidth=Math.max(3,bw*0.052);
  ctx.beginPath();ctx.ellipse(bx,by+rimRy,bw/2,rimRy,0,0,Math.PI*2);ctx.stroke();
  const rg=ctx.createLinearGradient(bx-bw/2,0,bx+bw/2,0);
  rg.addColorStop(0,'#162810');rg.addColorStop(0.42,'#a8dc62');rg.addColorStop(1,'#162810');
  ctx.strokeStyle=rg;ctx.lineWidth=Math.max(2,bw*0.032);
  ctx.beginPath();ctx.ellipse(bx,by+rimRy,bw/2,rimRy,0,Math.PI,0);ctx.stroke();

  // handle
  ctx.strokeStyle='#b0b090';ctx.lineWidth=2.8;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(bx,by+rimRy-4,bw*0.28,Math.PI,0);ctx.stroke();
  ctx.fillStyle='#c8c8a8';
  [bx-bw/2,bx+bw/2].forEach(hx=>{
    ctx.beginPath();ctx.arc(hx,by+rimRy,4,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(hx,by+rimRy,4,0,Math.PI*2);ctx.stroke();
  });

  // Overflow warning — drips hanging over rim when >78% full
  if(fill>0.78&&!bucket.dumping){
    const overflow=(fill-0.78)/0.22;
    // Pulsing red rim glow
    const pulse=0.45+Math.sin(t*14)*0.45;
    ctx.strokeStyle=`rgba(255,45,45,${pulse*0.75})`;ctx.lineWidth=2.2;
    ctx.beginPath();ctx.ellipse(bx,by+rimRy,bw/2,rimRy,0,0,Math.PI*2);ctx.stroke();
    // Drip blobs along front of rim
    ctx.fillStyle=`rgba(45,115,225,0.80)`;
    for(let i=0;i<3;i++){
      const rx=bx+(-0.5+i*0.5)*bw*0.55;
      const sz=overflow*(2.8+Math.sin(t*10+i*2.4)*1.4);
      if(sz>0.5){ctx.beginPath();ctx.ellipse(rx,by+rimRy*2+sz*0.6,2,sz,0,0,Math.PI*2);ctx.fill();}
    }
  }

  // ── 選択中: 黄色ハロー + 「バケツ」バッジ ──
  if(isSelected&&!bucket.dumping){
    ctx.save();
    ctx.shadowColor='rgba(255,225,50,0.95)';ctx.shadowBlur=18;
    ctx.strokeStyle='rgba(255,225,50,0.88)';ctx.lineWidth=2.8;
    ctx.beginPath();ctx.ellipse(bx,by+rimRy,bw/2+5,rimRy+2.5,0,0,Math.PI*2);ctx.stroke();
    ctx.restore();
    const fsz=Math.max(11,Math.floor(CELL*0.62));
    ctx.fillStyle='rgba(0,0,0,0.58)';
    ctx.beginPath();ctx.roundRect(bx-fsz*1.6,by-fsz-16,fsz*3.2,fsz+8,4);ctx.fill();
    ctx.textAlign='center';
    ctx.fillStyle='#ffe840';ctx.font=`bold ${fsz}px Arial`;
    ctx.fillText('バケツ',bx,by-14);
  }

  ctx.restore();
}

function _drawContainerIcon(type,cx,bottomY,iw,ih,alpha){
  ctx.save();
  if(alpha!==undefined)ctx.globalAlpha=alpha;
  const ix=cx,iy=bottomY;
  const isTub=type==='tub';
  const btw=iw*(isTub?0.72:0.68);
  const rimRy=Math.max(2,iw*(isTub?0.062:0.090));
  const botRy=Math.max(1.5,btw*(isTub?0.055:0.078));
  const C=isTub?['#4a3806','#886a0c','#e8ca3c','#886a0c','#3a2a04']:['#1c3010','#355820','#80ba46','#3a5e16','#152008'];
  // body (clipped trapezoid)
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ix-iw/2,iy-ih+rimRy);ctx.lineTo(ix+iw/2,iy-ih+rimRy);
  ctx.lineTo(ix+btw/2,iy);ctx.lineTo(ix-btw/2,iy);ctx.closePath();ctx.clip();
  const bg=ctx.createLinearGradient(ix-iw/2,0,ix+iw/2,0);
  bg.addColorStop(0,C[0]);bg.addColorStop(0.10,C[1]);bg.addColorStop(0.30,C[2]);
  bg.addColorStop(0.58,C[3]);bg.addColorStop(1,C[0]);
  ctx.fillStyle=bg;ctx.fillRect(ix-iw/2,iy-ih,iw,ih+2);
  const bands=isTub?2:3;
  for(let bi=1;bi<=bands;bi++){
    const fy=(iy-ih)+ih*(bi/(bands+1)),hw=iw/2-(iw-btw)/2*(bi/(bands+1));
    ctx.strokeStyle='rgba(0,0,0,0.13)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(ix-hw,fy);ctx.lineTo(ix+hw,fy);ctx.stroke();
  }
  ctx.save();ctx.globalAlpha=0.24;ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.moveTo(ix-iw*0.26,iy-ih*0.92+rimRy);ctx.lineTo(ix-iw*0.17,iy-ih*0.92+rimRy);
  ctx.lineTo(ix-btw*0.17,iy-ih*0.30);ctx.lineTo(ix-btw*0.25,iy-ih*0.30);
  ctx.closePath();ctx.fill();ctx.restore();
  ctx.restore();
  // base ellipse
  ctx.fillStyle=isTub?'rgba(25,18,3,0.36)':'rgba(8,16,4,0.36)';
  ctx.beginPath();ctx.ellipse(ix,iy,btw/2,botRy,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=isTub?'rgba(30,22,4,0.55)':'rgba(10,20,5,0.55)';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.ellipse(ix,iy,btw/2,botRy,0,0,Math.PI*2);ctx.stroke();
  // rim
  ctx.fillStyle=isTub?'rgba(12,8,2,0.74)':'rgba(4,10,2,0.74)';
  ctx.beginPath();ctx.ellipse(ix,iy-ih+rimRy,iw/2,rimRy,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=C[0];ctx.lineWidth=Math.max(1.8,iw*0.045);
  ctx.beginPath();ctx.ellipse(ix,iy-ih+rimRy,iw/2,rimRy,0,0,Math.PI*2);ctx.stroke();
  const rg=ctx.createLinearGradient(ix-iw/2,0,ix+iw/2,0);
  rg.addColorStop(0,C[0]);rg.addColorStop(0.42,C[2]);rg.addColorStop(1,C[0]);
  ctx.strokeStyle=rg;ctx.lineWidth=Math.max(1.2,iw*0.028);
  ctx.beginPath();ctx.ellipse(ix,iy-ih+rimRy,iw/2,rimRy,0,Math.PI,0);ctx.stroke();
  // handle
  if(isTub){
    const lugR=Math.max(3,iw*0.065);const lugOff=Math.max(2,iw*0.05);
    ctx.strokeStyle='#8a6a0a';ctx.lineWidth=Math.max(1.5,iw*0.032);ctx.lineCap='round';
    ctx.beginPath();ctx.arc(ix-iw/2-lugOff,iy-ih*0.40,lugR,Math.PI*0.5,Math.PI*1.5);ctx.stroke();
    ctx.beginPath();ctx.arc(ix+iw/2+lugOff,iy-ih*0.40,lugR,-Math.PI*0.5,Math.PI*0.5);ctx.stroke();
    ctx.fillStyle='#a07e10';
    [ix-iw/2,ix+iw/2].forEach(hx=>{ctx.beginPath();ctx.arc(hx,iy-ih*0.40,Math.max(1.5,iw*0.028),0,Math.PI*2);ctx.fill();});
  }else{
    ctx.strokeStyle='#b0b090';ctx.lineWidth=Math.max(1.5,iw*0.038);ctx.lineCap='round';
    ctx.beginPath();ctx.arc(ix,iy-ih+rimRy-2,iw*0.26,Math.PI,0);ctx.stroke();
    ctx.fillStyle='#c8c8a8';
    [ix-iw/2,ix+iw/2].forEach(hx=>{ctx.beginPath();ctx.arc(hx,iy-ih+rimRy,Math.max(2,iw*0.042),0,Math.PI*2);ctx.fill();});
  }
  ctx.restore();
}

function drawItemButtons(){
  const bg=ctx.createLinearGradient(0,BTN_TOP,0,H);
  bg.addColorStop(0,'#181008');bg.addColorStop(1,'#0c0804');
  ctx.fillStyle=bg;ctx.fillRect(0,BTN_TOP,W,BTN_H);
  ctx.fillStyle='rgba(200,160,80,0.10)';ctx.fillRect(0,BTN_TOP,W,1);

  for(let i=0;i<itemSlots.length;i++){
    const slot=itemSlots[i];
    const sx=i*SLOT_W,sw=SLOT_W;
    const cx2=sx+sw/2,cy2=BTN_TOP+BTN_H/2;
    const deployed=spawnedItems.some(si=>si.type===slot.type);
    const ready=slot.cooldownT<=0&&!deployed;

    const sbg=ready?'#182e0e':(deployed?'#0e1e30':'#141008');
    ctx.fillStyle=sbg;ctx.fillRect(sx+2,BTN_TOP+2,sw-4,BTN_H-4);
    const sbc=ready?`rgba(70,210,70,${0.4+Math.sin(t*4)*0.2})`:(deployed?'rgba(70,150,255,0.32)':'rgba(70,50,22,0.35)');
    ctx.strokeStyle=sbc;ctx.lineWidth=1.5;ctx.strokeRect(sx+2,BTN_TOP+2,sw-4,BTN_H-4);

    const iw2=Math.floor(sw*0.30),ih2=Math.floor(BTN_H*0.42),tw3=iw2*0.78;
    const color=slot.type==='tub'?'#c0a820':'#7a9850';

    if(deployed){
      const si=spawnedItems.find(s=>s.type===slot.type);
      ctx.textAlign='center';ctx.fillStyle='rgba(90,170,255,0.85)';
      ctx.font=`bold ${Math.floor(BTN_H*0.24)}px Arial`;ctx.fillText('使用中',cx2,cy2-BTN_H*0.06);
      if(si){
        const tr=si.timeLeft/si.dur;
        ctx.fillStyle=tr>0.35?'rgba(70,210,70,0.75)':'rgba(255,75,75,0.85)';
        ctx.font=`${Math.floor(BTN_H*0.21)}px Arial`;ctx.fillText(`残${Math.ceil(si.timeLeft)}s`,cx2,cy2+BTN_H*0.24);
      }
    }else if(ready){
      const isTub2=slot.type==='tub';
      const ih_ic=Math.floor(BTN_H*(isTub2?0.36:0.48));
      const iw_ic=Math.min(Math.floor(ih_ic*(isTub2?2.92:1.25)),Math.floor(sw*0.82));
      const ic_by=Math.floor(cy2+ih_ic*0.22);
      _drawContainerIcon(slot.type,cx2,ic_by,iw_ic,ih_ic,0.88+Math.sin(t*4)*0.12);
      ctx.textAlign='center';ctx.fillStyle='rgba(190,255,170,0.92)';
      ctx.font=`bold ${Math.floor(BTN_H*0.21)}px Arial`;ctx.fillText(slot.label,cx2,ic_by+Math.floor(BTN_H*0.22));
      ctx.fillStyle='rgba(160,230,140,0.75)';ctx.font=`${Math.floor(BTN_H*0.15)}px Arial`;ctx.fillText('▼ 配備',cx2,BTN_TOP+Math.floor(BTN_H*0.14));
    }else{
      // Cooldown
      const ratio=1-slot.cooldownT/slot.cooldownMax;
      const isTub2=slot.type==='tub';
      const ih_ic=Math.floor(BTN_H*(isTub2?0.36:0.48));
      const iw_ic=Math.min(Math.floor(ih_ic*(isTub2?2.92:1.25)),Math.floor(sw*0.82));
      const ic_by=Math.floor(cy2+ih_ic*0.22);
      _drawContainerIcon(slot.type,cx2,ic_by,iw_ic,ih_ic,0.22);
      const arcR=Math.floor(BTN_H*0.27);
      ctx.strokeStyle='rgba(70,50,20,0.38)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(cx2,cy2,arcR,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle='rgba(190,155,55,0.78)';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(cx2,cy2,arcR,-Math.PI/2,-Math.PI/2+Math.PI*2*ratio);ctx.stroke();
      ctx.textAlign='center';ctx.fillStyle='rgba(170,130,50,0.85)';
      ctx.font=`bold ${Math.floor(BTN_H*0.28)}px Arial`;ctx.fillText(`${Math.ceil(slot.cooldownT)}s`,cx2,cy2+Math.floor(BTN_H*0.10));
      ctx.fillStyle='rgba(140,105,40,0.65)';ctx.font=`${Math.floor(BTN_H*0.18)}px Arial`;ctx.fillText(slot.label,cx2,cy2+Math.floor(BTN_H*0.38));
    }
    if(i<itemSlots.length-1){ctx.fillStyle='rgba(70,50,22,0.4)';ctx.fillRect(sx+sw-1,BTN_TOP,1,BTN_H);}
  }
}

function updateTitleRain(dt){
  if(!titleRainInited){
    titleRain=[];
    const n=Math.floor(W*0.55)+60;
    for(let i=0;i<n;i++)titleRain.push({
      x:Math.random()*W,y:Math.random()*H,
      s:1.0+Math.random()*2.8,l:7+Math.random()*14,
      a:0.25+Math.random()*0.55,sl:0.12+Math.random()*0.18,
      spd:320+Math.random()*260
    });
    titleRainInited=true;
  }
  for(const d of titleRain){
    d.y+=d.spd*dt;
    d.x+=d.sl*d.spd*dt;
    if(d.y>H+20){d.y=-20;d.x=Math.random()*W;}
  }
}

function _drawTitleBtn(x,y,w,h,label,isPrimary,pulse){

    ctx.beginPath();ctx.roundRect(x-3,y-3,w+6,h+6,h/2+3);ctx.stroke();

    ctx.fillStyle=bg;
    ctx.beginPath();ctx.roundRect(x,y,w,h,h/2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.18)';
    ctx.beginPath();ctx.roundRect(x+5,y+4,w-10,h*0.38,h/2-2);ctx.fill();

    ctx.beginPath();ctx.roundRect(x,y,w,h,h/2);ctx.stroke();

    ctx.fillStyle='#fff';
  }else{

    ctx.beginPath();ctx.roundRect(x,y,w,h,h/2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.08)';
